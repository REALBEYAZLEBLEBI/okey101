<script>
/* =========================================================
   OKEY 101 — Oyun Motoru (Game Engine)
   Pure logic, no DOM. Works in browser and Node.
   ========================================================= */
'use strict';

const COLORS = ['red', 'yellow', 'blue', 'black'];
const COLOR_TR = { red: 'Kırmızı', yellow: 'Sarı', blue: 'Mavi', black: 'Siyah' };

/* ---------- Tiles ---------- */
// tile: { id, color: 0..3, num: 1..13, fake: bool }  (fake => sahte okey / joker tile)
function createTileSet() {
  const tiles = [];
  let id = 0;
  for (let c = 0; c < 4; c++) {
    for (let n = 1; n <= 13; n++) {
      tiles.push({ id: id++, color: c, num: n, fake: false });
      tiles.push({ id: id++, color: c, num: n, fake: false });
    }
  }
  tiles.push({ id: id++, color: -1, num: 0, fake: true });
  tiles.push({ id: id++, color: -1, num: 0, fake: true });
  return tiles; // 106
}

function shuffle(arr, rng) {
  rng = rng || Math.random;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* Okey (wild) determination: indicator tile -> okey = same color, num+1 (13 -> 1) */
function okeyFromIndicator(ind) {
  return { color: ind.color, num: ind.num === 13 ? 1 : ind.num + 1 };
}

function isOkeyTile(t, okey) { // real wild tile
  return !t.fake && t.color === okey.color && t.num === okey.num;
}

/* Effective identity of a tile for melds:
   - real okey  -> wildcard (returns null)
   - fake joker -> plays as the okey's color/number
   - normal     -> itself */
function effective(t, okey) {
  if (t.fake) return { color: okey.color, num: okey.num };
  if (isOkeyTile(t, okey)) return null; // wildcard
  return { color: t.color, num: t.num };
}

/* Point value of a tile left in hand (okey & fake joker count as okey's number) */
function tileValue(t, okey) {
  if (t.fake || isOkeyTile(t, okey)) return okey.num;
  return t.num;
}

/* ---------- Meld validation ----------
   A meld is valid as:
   - GROUP: 3-4 tiles, same number, all different colors
   - RUN:   3+ tiles, same color, consecutive numbers within 1..13.
            13 is the end of a run — no wraparound (…12,13,1 is NOT valid).
   Wildcards (real okey tiles) can substitute anything.
   Returns { valid, type, points } — points = sum of represented numbers. */
function validateMeld(tiles, okey) {
  if (!tiles || tiles.length < 3) return { valid: false };
  let wilds = 0;
  const eff = [];
  for (const t of tiles) {
    const e = effective(t, okey);
    if (e === null) wilds++;
    else eff.push(e);
  }
  // all wilds: treat as group of okey.num
  if (eff.length === 0) {
    if (tiles.length <= 4) return { valid: true, type: 'group', points: okey.num * tiles.length };
    return { valid: false };
  }

  // GROUP check
  const num = eff[0].num;
  const sameNum = eff.every(e => e.num === num);
  if (sameNum && tiles.length >= 3 && tiles.length <= 4) {
    const colors = new Set(eff.map(e => e.color));
    if (colors.size === eff.length) {
      return { valid: true, type: 'group', points: num * tiles.length };
    }
  }

  // RUN check
  const color = eff[0].color;
  if (eff.every(e => e.color === color)) {
    const res = validateRunNumbers(eff.map(e => e.num), wilds, tiles.length);
    if (res.valid) return { valid: true, type: 'run', points: res.points };
  }
  return { valid: false };
}

/* Try to arrange given numbers (same color) + wilds into a consecutive run.
   Strictly 1..13, no wraparound — 13 is always the final tile of a run.
   Wilds fill internal gaps first; leftover wilds extend high end, then low end. */
function validateRunNumbers(nums, wilds, totalLen) {
  if (new Set(nums).size !== nums.length) return { valid: false };
  const s = [...nums].sort((a, b) => a - b);
  const min = s[0], max = s[s.length - 1];
  const span = max - min + 1;
  if (span > totalLen) return { valid: false };
  const gaps = span - s.length;
  if (gaps > wilds) return { valid: false };
  let extra = wilds - gaps;
  let lo = min, hi = max;
  while (extra > 0 && hi < 13) { hi++; extra--; }
  while (extra > 0 && lo > 1) { lo--; extra--; }
  if (extra > 0) return { valid: false };
  let points = 0;
  for (let n = lo; n <= hi; n++) points += n;
  return { valid: true, points, lo, hi };
}

/* Assign a concrete run position to every tile (wilds included).
   Only meaningful for tiles that form a valid run. */
function assignRunPositions(tiles, okey) {
  const wilds = [], normal = [];
  for (const t of tiles) {
    const e = effective(t, okey);
    if (e === null) wilds.push(t);
    else normal.push({ t, n: e.num });
  }
  if (!normal.length) return tiles.map((t, i) => ({ t, n: i + 1 }));
  normal.sort((a, b) => a.n - b.n);
  const nums = normal.map(x => x.n);
  const min = nums[0], max = nums[nums.length - 1];
  let extra = wilds.length - ((max - min + 1) - nums.length);
  let lo = min, hi = max;
  while (extra > 0 && hi < 13) { hi++; extra--; }
  while (extra > 0 && lo > 1) { lo--; extra--; }
  const have = new Map(normal.map(x => [x.n, x.t]));
  const wpool = wilds.slice();
  const out = [];
  for (let n = lo; n <= hi; n++) {
    if (have.has(n)) out.push({ t: have.get(n), n });
    else if (wpool.length) out.push({ t: wpool.pop(), n });
  }
  return out;
}
function sortRunTiles(tiles, okey) {
  return assignRunPositions(tiles, okey).map(x => x.t);
}
/* Split a long run into table melds of >= 3 tiles (6 -> 3+3, 7 -> 3+4, 9 -> 3+3+3),
   so other players can attach to each piece. */
function splitRunTiles(tiles, okey) {
  const seq = sortRunTiles(tiles, okey);
  const chunks = [];
  let i = 0;
  while (seq.length - i >= 6) { chunks.push(seq.slice(i, i + 3)); i += 3; }
  chunks.push(seq.slice(i));
  return chunks;
}

/* Pair: exactly 2 tiles with identical effective identity; wildcard matches anything */
function validatePair(tiles, okey) {
  if (!tiles || tiles.length !== 2) return { valid: false };
  const a = effective(tiles[0], okey), b = effective(tiles[1], okey);
  if (a === null || b === null) return { valid: true, type: 'pair' };
  return { valid: a.color === b.color && a.num === b.num, type: 'pair' };
}

/* Can `tile` be appended to an existing meld (group/run)? Pairs cannot be extended. */
function canAttach(meld, tile, okey) {
  if (meld.type === 'pair') return false;
  const test = validateMeld([...meld.tiles, tile], okey);
  return test.valid;
}

/* ---------- Hand analysis (AI + hints) ----------
   Smart meld cover: enumerate every candidate meld (count-based so duplicate
   tiles are handled), then run a pruned branch-and-bound search maximizing
   total points; ties break toward covering MORE tiles. This finds
   arrangements the old greedy missed (e.g. okey building a new meld with a
   pair instead of fattening an already-complete run). */
function enumerateCandidates(hand, okey) {
  const counts = new Array(52).fill(0);
  let wildCount = 0;
  for (const t of hand) {
    const e = effective(t, okey);
    if (e === null) wildCount++;
    else counts[e.color * 13 + (e.num - 1)]++;
  }
  const cands = [];
  // groups: same number, distinct colors, wilds fill to size 3-4
  for (let n = 1; n <= 13; n++) {
    const avail = [];
    for (let c = 0; c < 4; c++) if (counts[c * 13 + n - 1] > 0) avail.push(c);
    const m = avail.length;
    for (let mask = 0; mask < (1 << m); mask++) {
      const sel = [];
      for (let b = 0; b < m; b++) if (mask & (1 << b)) sel.push(avail[b]);
      const maxW = Math.min(wildCount, 4 - sel.length);
      for (let w = 0; w <= maxW; w++) {
        const size = sel.length + w;
        if (size < 3 || size > 4) continue;
        cands.push({ need: sel.map(c => c * 13 + n - 1), w, pts: n * size, type: 'group' });
      }
    }
  }
  // runs: same color windows within 1..13, wilds fill the gaps
  for (let c = 0; c < 4; c++) {
    for (let start = 1; start <= 11; start++) {
      for (let end = start + 2; end <= 13; end++) {
        const need = [];
        let missing = 0;
        for (let n = start; n <= end; n++) {
          if (counts[c * 13 + n - 1] > 0) need.push(c * 13 + n - 1);
          else missing++;
        }
        if (missing > wildCount || need.length === 0) continue;
        let pts = 0;
        for (let n = start; n <= end; n++) pts += n;
        cands.push({ need, w: missing, pts, type: 'run' });
      }
    }
  }
  return { cands, counts, wildCount };
}

function bestMeldCover(hand, okey) {
  const { cands, counts, wildCount } = enumerateCandidates(hand, okey);
  cands.sort((a, b) => b.pts - a.pts);
  const sfx = new Array(cands.length + 1).fill(0);
  for (let i = cands.length - 1; i >= 0; i--) sfx[i] = sfx[i + 1] + cands[i].pts;
  let bestPts = 0, bestUsed = 0;
  let bestSel = [];
  let nodes = 0;
  const NODE_CAP = 20000;
  const sel = [];
  const dfs = (i, pts, used, wl) => {
    if (nodes++ > NODE_CAP) return;
    if (pts > bestPts || (pts === bestPts && used > bestUsed)) {
      bestPts = pts; bestUsed = used; bestSel = sel.slice();
    }
    if (i >= cands.length) return;
    if (pts + sfx[i] < bestPts) return; // cannot beat the best anymore
    const c = cands[i];
    let ok = wl >= c.w;
    if (ok) for (const cn of c.need) if (counts[cn] <= 0) { ok = false; break; }
    if (ok) {
      for (const cn of c.need) counts[cn]--;
      sel.push(i);
      dfs(i + 1, pts + c.pts, used + c.need.length + c.w, wl - c.w);
      sel.pop();
      for (const cn of c.need) counts[cn]++;
    }
    dfs(i + 1, pts, used, wl);
  };
  dfs(0, 0, 0, wildCount);
  // materialize the chosen candidates into concrete tiles
  const pools = new Map();
  const wilds = [];
  for (const t of hand) {
    const e = effective(t, okey);
    if (e === null) { wilds.push(t); continue; }
    const cn = e.color * 13 + (e.num - 1);
    if (!pools.has(cn)) pools.set(cn, []);
    pools.get(cn).push(t);
  }
  const melds = [];
  let total = 0;
  for (const idx of bestSel) {
    const c = cands[idx];
    const tiles = c.need.map(cn => pools.get(cn).pop());
    for (let k = 0; k < c.w; k++) tiles.push(wilds.pop());
    melds.push({ tiles, points: c.pts, type: c.type });
    total += c.pts;
  }
  const usedIds = new Set(melds.flatMap(m => m.tiles.map(t => t.id)));
  const leftover = hand.filter(t => !usedIds.has(t.id));
  return { melds, points: total, leftover };
}

function bestSingleMeld(pool, okey) {
  const wildTiles = pool.filter(t => effective(t, okey) === null);
  const normal = pool.filter(t => effective(t, okey) !== null);
  // index by color/num of effective identity (fake jokers become okey identity)
  const byColorNum = new Map(); // key `${c}-${n}` -> tiles[]
  for (const t of normal) {
    const e = effective(t, okey);
    const k = e.color + '-' + e.num;
    if (!byColorNum.has(k)) byColorNum.set(k, []);
    byColorNum.get(k).push(t);
  }
  const take = (c, n) => {
    const arr = byColorNum.get(c + '-' + n);
    return arr && arr.length ? arr[arr.length - 1] : null;
  };
  let best = null;
  const consider = (tiles, points, type) => {
    if (!best || points > best.points) best = { tiles, points, type };
  };

  // GROUPS: for each number, distinct colors available
  for (let n = 1; n <= 13; n++) {
    const colorsAvail = [];
    for (let c = 0; c < 4; c++) if (take(c, n)) colorsAvail.push(c);
    const maxW = Math.min(wildTiles.length, 4 - colorsAvail.length);
    for (let w = 0; w <= maxW; w++) {
      const size = colorsAvail.length + w;
      if (size < 3 || size > 4) continue;
      const tiles = colorsAvail.map(c => take(c, n)).concat(wildTiles.slice(0, w));
      consider(tiles, n * size, 'group');
    }
  }

  // RUNS: windows per color, strictly 1..13
  for (let c = 0; c < 4; c++) {
    const have = (n) => !!take(c, n);
    for (let start = 1; start <= 11; start++) {
      for (let end = start + 2; end <= 13; end++) {
        let missingCnt = 0;
        for (let n = start; n <= end; n++) if (!have(n)) missingCnt++;
        if (missingCnt > wildTiles.length) continue;
        const tiles = [];
        for (let n = start; n <= end; n++) if (have(n)) tiles.push(take(c, n));
        const wNeed = (end - start + 1) - tiles.length;
        const meldTiles = tiles.concat(wildTiles.slice(0, wNeed));
        const v = validateMeld(meldTiles, okey);
        if (v.valid) consider(meldTiles, v.points, 'run');
      }
    }
  }
  // require a minimum: any valid meld
  return best;
}

/* Count best pair cover (for pairs opening). Wildcards pair with leftovers. */
function bestPairCover(hand, okey) {
  const wilds = hand.filter(t => effective(t, okey) === null);
  const normal = hand.filter(t => effective(t, okey) !== null);
  const groups = new Map();
  for (const t of normal) {
    const e = effective(t, okey);
    const k = e.color + '-' + e.num;
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(t);
  }
  const pairs = [];
  const singles = [];
  for (const arr of groups.values()) {
    while (arr.length >= 2) pairs.push([arr.pop(), arr.pop()]);
    if (arr.length) singles.push(arr.pop());
  }
  // wilds pair with highest-value singles first
  singles.sort((a, b) => tileValue(b, okey) - tileValue(a, okey));
  const wpool = wilds.slice();
  while (wpool.length && singles.length) pairs.push([wpool.pop(), singles.shift()]);
  while (wpool.length >= 2) pairs.push([wpool.pop(), wpool.pop()]);
  return pairs;
}

/* ---------- Game state ---------- */
/*
players: [{ name, isBot, hand:[], opened:false, openType:null ('normal'|'pairs'),
            score, roundScore }]
tableMelds: [{ owner, type, tiles:[] }]
*/
function newGame(opts) {
  const g = {
    rounds: opts.rounds || 5,
    round: 0,
    katlamali: opts.katlamali !== false, // katlamalı: her yeni açış öncekini geçmek zorunda
    esli: !!opts.esli,                   // eşli: 0-2 ve 1-3 takımdır, puanlar toplanır
    rizikolu: !!opts.rizikolu,           // rizikolu: çarpanlı bahis modu
    carpan: 1,                           // rizikolu bahis çarpanı
    players: opts.names.map((name, i) => ({
      name, isBot: i !== 0, hand: [], opened: false, openType: null,
      score: 0, roundScore: 0,
    })),
    rng: opts.rng || Math.random,
  };
  return g;
}

function startRound(g) {
  g.round++;
  const tiles = shuffle(createTileSet(), g.rng);
  // indicator: must be a normal tile
  let indIdx = tiles.findIndex(t => !t.fake);
  const indicator = tiles.splice(indIdx, 1)[0];
  g.indicator = indicator;
  g.okey = okeyFromIndicator(indicator);
  // dealer rotates; starter = player after dealer (counter-clockwise = next index)
  g.dealer = (g.round - 1) % 4;
  g.turn = (g.dealer + 1) % 4;
  g.starter = g.turn;
  for (const p of g.players) {
    p.hand = []; p.opened = false; p.openType = null; p.roundScore = 0;
    p.tookDiscard = null; p.penalty = 0; p.openPoints = 0; p.openedOnTurn = -1;
  }
  g.penaltyLog = [];
  g.lastOpen = null;
  g.turnCounter = 0;
  g.finalTile = null;
  for (let i = 0; i < 4; i++) {
    const cnt = i === g.starter ? 22 : 21;
    const p = g.players[i];
    for (let k = 0; k < cnt; k++) p.hand.push(tiles.pop());
  }
  g.deck = tiles;
  g.discards = [[], [], [], []]; // per-player discard piles
  g.tableMelds = [];
  g.phase = 'discard'; // starter begins by discarding (no draw)
  g.hasDrawn = true;   // starter counts as "drawn" (they discard directly)
  g.finisher = -1;
  g.finishedWithOkey = false;
  g.roundOver = false;
  g.log = [];
}

/* Whose discard can current player take? previous player in turn order */
function prevPlayer(g) { return (g.turn + 3) % 4; }
function nextPlayer(g) { return (g.turn + 1) % 4; }

function lastDiscardOfPrev(g) {
  const pile = g.discards[prevPlayer(g)];
  return pile.length ? pile[pile.length - 1] : null;
}

function drawFromDeck(g) {
  if (g.hasDrawn || g.roundOver) return null;
  if (!g.deck.length) return null;
  const t = g.deck.pop();
  g.players[g.turn].hand.push(t);
  g.hasDrawn = true;
  return t;
}

function takeDiscard(g) {
  if (g.hasDrawn || g.roundOver) return null;
  const pile = g.discards[prevPlayer(g)];
  if (!pile.length) return null;
  const t = pile.pop();
  const p = g.players[g.turn];
  p.hand.push(t);
  p.tookDiscard = t.id; // must be used this turn
  g.hasDrawn = true;
  return t;
}

/* Undo a takeDiscard: tile goes back on the pile; the player must then
   draw from the deck themselves (hasDrawn becomes false). */
function returnDiscard(g) {
  const p = g.players[g.turn];
  if (p.tookDiscard == null) return null;
  const idx = p.hand.findIndex(t => t.id === p.tookDiscard);
  const t = p.hand.splice(idx, 1)[0];
  g.discards[prevPlayer(g)].push(t);
  p.tookDiscard = null;
  g.hasDrawn = false;
  return t;
}

/* RİZİKOLU: okeyin sayısını taşıyan taşlar, sahte okey ve okey masaya
   indikçe bahis çarpanı +1 artar */
function rizikoAdd(g, tiles) {
  if (!g.rizikolu) return;
  for (const t of tiles) {
    if (t.fake || isOkeyTile(t, g.okey) || t.num === g.okey.num) g.carpan = (g.carpan || 1) + 1;
  }
}

/* Katlamalı modda açış barajı: yeni açan, önceki en yüksek açışı geçmek
   zorundadır (seri: sayı+1, çift: çift sayısı+1). Katlamasızda hep 101 / 5. */
function openReq(g) {
  let seri = 101, cift = 5;
  if (g.katlamali !== false) {
    for (const p of g.players) {
      if (!p.opened) continue;
      if (p.openType === 'pairs') cift = Math.max(cift, (p.openPoints || 5) + 1);
      else seri = Math.max(seri, (p.openPoints || 101) + 1);
    }
  }
  return { seri, cift };
}

/* Open hand with melds (normal) or pairs. meldsTiles: array of tile arrays. */
function openHand(g, meldsTiles, mode) {
  const p = g.players[g.turn];
  if (p.opened) return { ok: false, err: 'Zaten açtınız.' };
  if (!g.hasDrawn) return { ok: false, err: 'Önce taş çekmelisiniz.' };

  const flat = meldsTiles.flat();
  // all tiles must be in hand, no duplicates
  const ids = new Set();
  for (const t of flat) {
    if (ids.has(t.id)) return { ok: false, err: 'Aynı taş iki kez kullanılamaz.' };
    ids.add(t.id);
    if (!p.hand.some(h => h.id === t.id)) return { ok: false, err: 'Taş elinizde değil.' };
  }
  // must keep at least 1 tile to discard
  if (p.hand.length - flat.length < 1) return { ok: false, err: 'Son taşı atmak için elinizde taş kalmalı.' };
  // took discard must be used
  if (p.tookDiscard != null && !ids.has(p.tookDiscard)) {
    return { ok: false, err: 'Ortadan aldığınız taşı kullanmak zorundasınız.' };
  }

  const newMelds = [];
  if (mode === 'pairs') {
    const reqC = openReq(g).cift;
    if (meldsTiles.length < reqC) {
      return { ok: false, err: reqC > 5
        ? 'Katlamalı: önceki açışı geçmek için en az ' + reqC + ' çift gerekir. (Şu an: ' + meldsTiles.length + ')'
        : 'Çiftten açmak için en az 5 çift gerekir.' };
    }
    for (const mt of meldsTiles) {
      const v = validatePair(mt, g.okey);
      if (!v.valid) return { ok: false, err: 'Geçersiz çift var.' };
      newMelds.push({ owner: g.turn, type: 'pair', tiles: mt });
    }
  } else {
    let total = 0;
    for (const mt of meldsTiles) {
      const v = validateMeld(mt, g.okey);
      if (!v.valid) return { ok: false, err: 'Geçersiz per var.' };
      total += v.points;
      if (v.type === 'run' && mt.length >= 6) {
        for (const chunk of splitRunTiles(mt, g.okey)) {
          newMelds.push({ owner: g.turn, type: 'run', tiles: chunk });
        }
      } else {
        newMelds.push({ owner: g.turn, type: v.type, tiles: mt });
      }
    }
    const reqS = openReq(g).seri;
    if (total < reqS) {
      return { ok: false, err: reqS > 101
        ? 'Katlamalı: önceki açışı geçmek için en az ' + reqS + ' sayı gerekir. (Şu an: ' + total + ')'
        : 'Açmak için en az 101 sayı gerekir. (Şu an: ' + total + ')' };
    }
  }

  // commit
  const prevTook = p.tookDiscard;
  for (const t of flat) {
    const i = p.hand.findIndex(h => h.id === t.id);
    p.hand.splice(i, 1);
  }
  g.tableMelds.push(...newMelds);
  rizikoAdd(g, flat);
  p.opened = true;
  p.openType = mode === 'pairs' ? 'pairs' : 'normal';
  p.openPoints = mode === 'pairs'
    ? meldsTiles.length
    : meldsTiles.reduce((s, mt) => s + validateMeld(mt, g.okey).points, 0);
  p.openedOnTurn = g.turnCounter;
  p.tookDiscard = null;
  // allow "undo" until the player commits another action
  g.lastOpen = { player: g.turn, meldCount: newMelds.length, prevTook, prevOpenPoints: 0 };
  return { ok: true };
}

/* Undo an accidental open: only right after openHand, before any other action */
function undoOpen(g) {
  const lo = g.lastOpen;
  if (!lo || lo.player !== g.turn) return { ok: false, err: 'Geri alınacak açış yok.' };
  const p = g.players[g.turn];
  const restored = g.tableMelds.splice(g.tableMelds.length - lo.meldCount, lo.meldCount);
  for (const m of restored) p.hand.push(...m.tiles);
  p.opened = false;
  p.openType = null;
  p.openPoints = 0;
  p.openedOnTurn = -1;
  p.tookDiscard = lo.prevTook;
  g.lastOpen = null;
  return { ok: true };
}

/* Lay a new meld after having opened (normal openers, any point value) */
function layMeld(g, tiles) {
  const p = g.players[g.turn];
  if (!p.opened || p.openType !== 'normal') return { ok: false, err: 'Önce elinizi (101 ile) açmalısınız.' };
  if (!g.hasDrawn) return { ok: false, err: 'Önce taş çekmelisiniz.' };
  const v = validateMeld(tiles, g.okey);
  if (!v.valid) return { ok: false, err: 'Geçersiz per.' };
  if (p.hand.length - tiles.length < 1) return { ok: false, err: 'Son taşı atmak için elinizde taş kalmalı.' };
  const ids = new Set();
  for (const t of tiles) {
    if (ids.has(t.id)) return { ok: false, err: 'Aynı taş iki kez kullanılamaz.' };
    ids.add(t.id);
    if (!p.hand.some(h => h.id === t.id)) return { ok: false, err: 'Taş elinizde değil.' };
  }
  for (const t of tiles) {
    const i = p.hand.findIndex(h => h.id === t.id);
    p.hand.splice(i, 1);
  }
  // NOTE: runs are split into 3+3 pieces only at the initial open —
  // melds laid later stay whole
  g.tableMelds.push({ owner: g.turn, type: v.type, tiles });
  rizikoAdd(g, tiles);
  if (p.tookDiscard != null && tiles.some(t => t.id === p.tookDiscard)) p.tookDiscard = null;
  g.lastOpen = null;
  return { ok: true };
}

/* Lay additional pair — pairs-openers always; a normal (seri) opener may
   also lay pairs, but only once ANOTHER player has opened with pairs */
function layPair(g, tiles) {
  const p = g.players[g.turn];
  const otherPairsOpen = g.players.some((q, i) => i !== g.turn && q.opened && q.openType === 'pairs');
  const allowed = p.opened && (p.openType === 'pairs' || (p.openType === 'normal' && otherPairsOpen));
  if (!allowed) return { ok: false, err: 'Çift atmak için çiftten açmalısınız (seri açtıysanız ancak masada çift açan biri varken atabilirsiniz).' };
  if (!g.hasDrawn) return { ok: false, err: 'Önce taş çekmelisiniz.' };
  const v = validatePair(tiles, g.okey);
  if (!v.valid) return { ok: false, err: 'Geçersiz çift.' };
  if (p.hand.length - 2 < 1) return { ok: false, err: 'Son taşı atmak için elinizde taş kalmalı.' };
  for (const t of tiles) {
    const i = p.hand.findIndex(h => h.id === t.id);
    if (i < 0) return { ok: false, err: 'Taş elinizde değil.' };
  }
  for (const t of tiles) {
    const i = p.hand.findIndex(h => h.id === t.id);
    p.hand.splice(i, 1);
  }
  g.tableMelds.push({ owner: g.turn, type: 'pair', tiles });
  rizikoAdd(g, tiles);
  if (p.tookDiscard != null && tiles.some(t => t.id === p.tookDiscard)) p.tookDiscard = null;
  g.lastOpen = null;
  return { ok: true };
}

/* ---------- Okey swap ----------
   If a real okey sits in a table meld substituting for a tile, a player may
   swap it out with either the FAKE JOKER (★) or the REAL TILE the okey
   stands for (e.g. meld 8-[okey as 9]-10: put your real 9 in, take the okey). */
function canSwapWith(g, meld, tile) {
  if (!tile || isOkeyTile(tile, g.okey)) return false;
  const okeyTile = meld.tiles.find(t => isOkeyTile(t, g.okey));
  if (!okeyTile) return false;
  const swapped = meld.tiles.map(t => (t.id === okeyTile.id ? tile : t));
  const v = meld.type === 'pair' ? validatePair(swapped, g.okey) : validateMeld(swapped, g.okey);
  return v.valid;
}
function canSwapFake(g, meld) {
  return canSwapWith(g, meld, { id: -1, color: -1, num: 0, fake: true });
}
function swapForOkey(g, tile, meldIndex) {
  const p = g.players[g.turn];
  if (!p.opened) return { ok: false, err: 'Okey değişimi için önce elinizi açmalısınız.' };
  if (!g.hasDrawn) return { ok: false, err: 'Önce taş çekmelisiniz.' };
  if (!tile || isOkeyTile(tile, g.okey)) return { ok: false, err: 'Okey ile değişim yapılamaz.' };
  const hi = p.hand.findIndex(h => h.id === tile.id);
  if (hi < 0) return { ok: false, err: 'Taş elinizde değil.' };
  const meld = g.tableMelds[meldIndex];
  if (!meld) return { ok: false, err: 'Per bulunamadı.' };
  const okeyTile = meld.tiles.find(t => isOkeyTile(t, g.okey));
  if (!okeyTile) return { ok: false, err: 'Bu perde okey yok.' };
  const swapped = meld.tiles.map(t => (t.id === okeyTile.id ? tile : t));
  const v = meld.type === 'pair' ? validatePair(swapped, g.okey) : validateMeld(swapped, g.okey);
  if (!v.valid) return { ok: false, err: 'Bu taş perdeki okeyin yerini tutamıyor.' };
  p.hand.splice(hi, 1);
  meld.tiles = swapped;
  rizikoAdd(g, [tile]);
  p.hand.push(okeyTile);
  if (p.tookDiscard != null && tile.id === p.tookDiscard) p.tookDiscard = null;
  g.lastOpen = null;
  return { ok: true, okey: okeyTile };
}
function swapFakeForOkey(g, fakeTile, meldIndex) { // backward-compat wrapper
  if (!fakeTile || !fakeTile.fake) return { ok: false, err: 'Değişim için sahte okey (★) ya da okeyin tuttuğu gerçek taş gerekir.' };
  return swapForOkey(g, fakeTile, meldIndex);
}

/* Attach one tile from hand to a table meld (must have opened) */
function attachTile(g, tile, meldIndex) {
  const p = g.players[g.turn];
  if (!p.opened) return { ok: false, err: 'Önce elinizi açmalısınız.' };
  if (!g.hasDrawn) return { ok: false, err: 'Önce taş çekmelisiniz.' };
  const meld = g.tableMelds[meldIndex];
  if (!meld) return { ok: false, err: 'Per bulunamadı.' };
  const i = p.hand.findIndex(h => h.id === tile.id);
  if (i < 0) return { ok: false, err: 'Taş elinizde değil.' };
  if (!canAttach(meld, tile, g.okey)) return { ok: false, err: 'Bu taş bu pere işlenemez.' };
  if (p.hand.length - 1 < 1) return { ok: false, err: 'Son taşı atmak için elinizde taş kalmalı.' };
  p.hand.splice(i, 1);
  meld.tiles.push(tile);
  rizikoAdd(g, [tile]);
  // runs grow whole after the initial open — no re-splitting (kural: bölme
  // sadece ilk açılışta uygulanır)
  if (p.tookDiscard != null && tile.id === p.tookDiscard) p.tookDiscard = null;
  g.lastOpen = null;
  return { ok: true };
}

/* Is discarding this tile penalized? (işlek = attachable to a table meld, or an okey) */
function isPenaltyDiscard(g, tile) {
  if (isOkeyTile(tile, g.okey)) return true;
  return g.tableMelds.some(m => canAttach(m, tile, g.okey));
}

/* Discard to end turn */
function discardTile(g, tile) {
  const p = g.players[g.turn];
  if (!g.hasDrawn) return { ok: false, err: 'Önce taş çekmelisiniz.' };
  if (p.tookDiscard != null && tile.id === p.tookDiscard) {
    return { ok: false, err: 'Ortadan aldığınız taşı atamazsınız; kullanmak zorundasınız.' };
  }
  if (p.tookDiscard != null) {
    return { ok: false, err: 'Ortadan aldığınız taşı bir pere işlemeden bitiremezsiniz.' };
  }
  const i = p.hand.findIndex(h => h.id === tile.id);
  if (i < 0) return { ok: false, err: 'Taş elinizde değil.' };
  const willFinish = p.hand.length === 1;
  let penalty = false;
  // işlek / okey discard penalty (+101) — the finishing tile is exempt
  if (!willFinish && isPenaltyDiscard(g, tile)) {
    penalty = true;
    p.penalty += 101;
    g.penaltyLog.push({ player: g.turn, amount: 101, tile: { color: tile.color, num: tile.num, fake: tile.fake } });
  }
  p.hand.splice(i, 1);
  g.discards[g.turn].push(tile);
  g.lastOpen = null;

  if (p.hand.length === 0) {
    // must have opened to finish
    if (!p.opened) {
      // shouldn't happen (opening requires melds), but guard
      p.hand.push(g.discards[g.turn].pop());
      return { ok: false, err: 'Açmadan bitemezsiniz.' };
    }
    g.finisher = g.turn;
    g.finishedWithOkey = isOkeyTile(tile, g.okey) || tile.fake;
    g.finalTile = tile;
    endRound(g);
    return { ok: true, finished: true };
  }

  // deck exhausted?
  if (g.deck.length === 0) {
    // next player has no tile to draw — round ends drawn (middle exhausted)
    // (they could still take the discard, but classic play ends the round; we end it)
    endRound(g);
    return { ok: true, exhausted: true, penalty };
  }

  g.turn = nextPlayer(g);
  g.hasDrawn = false;
  g.players[g.turn].tookDiscard = null;
  g.turnCounter++;
  return { ok: true, penalty };
}

/* ---------- Scoring ---------- */
function endRound(g) {
  g.roundOver = true;
  const fin = g.finisher;
  // (katlamalı/katlamasız yalnızca AÇIŞ BARAJINI etkiler — ceza katlamaları standarttır)
  const withOkey = g.finishedWithOkey;
  // "elden bitme": the finisher opened everything on the SAME turn they
  // finished, while nobody else had opened. Standard 101 scoring:
  //   winner keeps -101 (-202 with okey) — NOT doubled further;
  //   the other (unopened) players' penalties are doubled: 404 (808 with okey)
  let eldenBitti = false;
  if (fin >= 0) {
    const fp = g.players[fin];
    const othersOpened = g.players.some((p, i) => i !== fin && p.opened);
    eldenBitti = !othersOpened && fp.openedOnTurn === g.turnCounter;
    g.eldenBitti = eldenBitti;
  }
  // rizikolu bitiş bonusu: normal +1, elden +2, okeyle +4
  if (g.rizikolu && fin >= 0) g.carpan = (g.carpan || 1) + (withOkey ? 4 : eldenBitti ? 2 : 1);
  // tek açan bitirdiyse (kimse başka açmadıysa): çip dağıtımında hepsini süpürür
  g.soloOpen = (fin >= 0 && !g.players.some((p, i) => i !== fin && p.opened)) ? fin : -1;
  for (let i = 0; i < 4; i++) {
    const p = g.players[i];
    let pts;
    if (fin === i) {
      pts = withOkey ? -202 : -101;   // elden bitme kazananı katlamaz
    } else if (fin >= 0) {
      if (!p.opened) {
        pts = withOkey ? 404 : 202;
      } else {
        let sum = p.hand.reduce((s, t) => s + tileValue(t, g.okey), 0);
        if (withOkey) sum *= 2;
        if (p.openType === 'pairs') sum *= 2;     // double player caught
        pts = sum;
      }
      if (g.players[fin].openType === 'pairs') pts *= 2; // double player finished
      if (eldenBitti) pts *= 2;                          // only the others double
    } else {
      // deck exhausted, no finisher
      if (!p.opened) pts = 202;
      else {
        let sum = p.hand.reduce((s, t) => s + tileValue(t, g.okey), 0);
        if (p.openType === 'pairs') sum *= 2;
        pts = sum;
      }
    }
    pts += p.penalty || 0;   // işlek / okey discard penalties collected this round
    p.roundScore = pts;
    p.score += pts;
  }
  g.phase = 'roundEnd';
}

/* Cancel round: all four players opened pairs */
function checkAllPairsCancel(g) {
  if (g.players.every(p => p.opened && p.openType === 'pairs')) {
    g.roundOver = true;
    g.cancelled = true;
    for (const p of g.players) p.roundScore = 0;
    g.phase = 'roundEnd';
    return true;
  }
  return false;
}

/* ---------- AI ---------- */
function aiUsefulness(hand, tile, okey) {
  // heuristic usefulness of a tile within hand
  const e = effective(tile, okey);
  if (e === null) return 1000; // never discard okey
  let u = 0;
  for (const o of hand) {
    if (o.id === tile.id) continue;
    const oe = effective(o, okey);
    if (oe === null) { u += 0.5; continue; }
    if (oe.num === e.num && oe.color === e.color) u += 3;        // pair
    else if (oe.num === e.num && oe.color !== e.color) u += 1.5; // group potential
    else if (oe.color === e.color && Math.abs(oe.num - e.num) === 1) u += 1.5;
    else if (oe.color === e.color && Math.abs(oe.num - e.num) === 2) u += 0.7;
  }
  return u;
}

function aiChooseDiscard(g, p) {
  // discard least useful, highest value; prefer not to break made melds;
  // never throw an işlek (attachable) tile or an okey unless forced
  const cover = bestMeldCover(p.hand, g.okey);
  const inMeld = new Set(cover.melds.flatMap(m => m.tiles.map(t => t.id)));
  let cand = p.hand.filter(t => !inMeld.has(t.id));
  if (!cand.length) cand = p.hand.slice();
  cand = cand.filter(t => p.tookDiscard == null || t.id !== p.tookDiscard);
  if (!cand.length) cand = p.hand.filter(t => t.id !== p.tookDiscard);
  if (!cand.length) cand = p.hand.slice();
  const safe = cand.filter(t => !isPenaltyDiscard(g, t));
  if (safe.length) cand = safe; // avoid the +101 penalty whenever possible
  let best = null, bestScore = Infinity;
  for (const t of cand) {
    const u = aiUsefulness(p.hand, t, g.okey);
    const score = u * 100 - tileValue(t, g.okey);
    if (score < bestScore) { bestScore = score; best = t; }
  }
  return best;
}

/* Perform full AI turn. Returns array of event objects for UI animation. */
function aiTakeTurn(g) {
  const events = [];
  const p = g.players[g.turn];
  const idx = g.turn;

  // ---- 1. Draw phase ----
  if (!g.hasDrawn) {
    const disc = lastDiscardOfPrev(g);
    let took = false;
    if (disc) {
      if (p.opened && p.openType === 'normal') {
        // take if attaches to any meld
        const mi = g.tableMelds.findIndex(m => canAttach(m, disc, g.okey));
        if (mi >= 0) {
          takeDiscard(g);
          events.push({ type: 'take', player: idx, tile: disc });
          attachTile(g, disc, mi);
          events.push({ type: 'attach', player: idx, tile: disc, meld: mi });
          took = true;
        }
      } else if (!p.opened) {
        // take if enables opening with the tile used
        const trial = p.hand.concat([disc]);
        const cover = bestMeldCover(trial, g.okey);
        const usesTile = cover.melds.some(m => m.tiles.some(t => t.id === disc.id));
        if (cover.points >= openReq(g).seri && usesTile && trial.length - cover.melds.flat().length >= 1) {
          takeDiscard(g);
          events.push({ type: 'take', player: idx, tile: disc });
          const meldsTiles = trimCoverForOpen(cover, trial.length, openReq(g).seri);
          const r = openHand(g, meldsTiles, 'normal');
          if (r.ok) { events.push({ type: 'open', player: idx, melds: meldsTiles }); took = true; }
          else {
            returnDiscard(g);
            const dt = drawFromDeck(g);
            if (!dt) { endRound(g); events.push({ type: 'exhausted' }); return events; }
            events.push({ type: 'draw', player: idx }); took = true;
          }
        }
      }
    }
    if (!took) {
      const t = drawFromDeck(g);
      if (!t) { endRound(g); events.push({ type: 'exhausted' }); return events; }
      events.push({ type: 'draw', player: idx });
    }
  }

  // ---- 2. Open if possible ----
  if (!p.opened) {
    const cover = bestMeldCover(p.hand, g.okey);
    if (cover.points >= openReq(g).seri && p.hand.length - cover.melds.flat().length >= 1) {
      const meldsTiles = trimCoverForOpen(cover, p.hand.length, openReq(g).seri);
      const r = openHand(g, meldsTiles, 'normal');
      if (r.ok) events.push({ type: 'open', player: idx, melds: meldsTiles });
    } else {
      // pairs opening
      const pairs = bestPairCover(p.hand, g.okey);
      if (pairs.length >= 6 && p.hand.length - pairs.length * 2 >= 1) {
        // open with pairs only when strong (6+ pairs) — AI conservative
        const r = openHand(g, pairs, 'pairs');
        if (r.ok) {
          events.push({ type: 'openPairs', player: idx, melds: pairs });
          checkAllPairsCancel(g);
          if (g.roundOver) return events;
        }
      }
    }
  }

  // ---- 3. Lay new melds + attach loop (opened players) ----
  if (p.opened && p.openType === 'normal') {
    // lay any new melds (any value) while keeping one tile to discard
    let laying = true;
    while (laying) {
      laying = false;
      const cover = bestMeldCover(p.hand, g.okey);
      for (const m of cover.melds) {
        if (p.hand.length - m.tiles.length < 1) continue;
        // avoid spending the okey in a low-value meld early
        const usesWild = m.tiles.some(t => effective(t, g.okey) === null);
        if (usesWild && p.hand.length > 5 && m.points < 20) continue;
        const r = layMeld(g, m.tiles);
        if (r.ok) { events.push({ type: 'lay', player: idx, tiles: m.tiles }); laying = true; break; }
      }
    }
    let changed = true;
    while (changed && p.hand.length > 1) {
      changed = false;
      for (const t of p.hand.slice()) {
        if (p.hand.length <= 1) break;
        const mi = g.tableMelds.findIndex(m => canAttach(m, t, g.okey));
        // don't waste okey by attaching unless it finishes the hand soon
        const isWild = effective(t, g.okey) === null;
        if (mi >= 0 && (!isWild || p.hand.length <= 3)) {
          attachTile(g, t, mi);
          events.push({ type: 'attach', player: idx, tile: t, meld: mi });
          changed = true;
        }
      }
    }
  } else if (p.opened && p.openType === 'pairs') {
    // lay extra pairs, and attach to others' melds
    let changed = true;
    while (changed && p.hand.length > 2) {
      changed = false;
      const pairs = bestPairCover(p.hand, g.okey);
      if (pairs.length && p.hand.length - 2 >= 1) {
        const pr = pairs[0];
        const r = layPair(g, pr);
        if (r.ok) { events.push({ type: 'layPair', player: idx, tiles: pr }); changed = true; continue; }
      }
      for (const t of p.hand.slice()) {
        if (p.hand.length <= 1) break;
        const mi = g.tableMelds.findIndex(m => canAttach(m, t, g.okey));
        const isWild = effective(t, g.okey) === null;
        if (mi >= 0 && !isWild) {
          attachTile(g, t, mi);
          events.push({ type: 'attach', player: idx, tile: t, meld: mi });
          changed = true;
        }
      }
    }
  }

  if (g.roundOver) return events;

  // ---- 4. Discard ----
  const d = aiChooseDiscard(g, p);
  if (p.tookDiscard != null) {
    // couldn't use the taken tile (open failed) — rules: return & draw handled earlier.
    // Safety: clear flag to avoid deadlock (should not happen)
    p.tookDiscard = null;
  }
  const r = discardTile(g, d);
  events.push({ type: 'discard', player: idx, tile: d, finished: !!(r && r.finished), penalty: !!(r && r.penalty) });
  return events;
}

/* Reduce a greedy cover so at least one tile remains in hand after opening */
function trimCoverForOpen(cover, handLen, minPts) {
  minPts = minPts || 101;
  let melds = cover.melds.map(m => m.tiles);
  let used = melds.reduce((s, m) => s + m.length, 0);
  while (handLen - used < 1 && melds.length) {
    // drop the lowest-point meld while keeping >= the open requirement
    let dropIdx = -1, dropPts = Infinity;
    let total = cover.melds.reduce((s, m) => s + m.points, 0);
    for (let i = 0; i < cover.melds.length; i++) {
      const m = cover.melds[i];
      if (total - m.points >= minPts && m.points < dropPts) { dropPts = m.points; dropIdx = i; }
    }
    if (dropIdx < 0) {
      // can't drop a whole meld; drop last tile of a long run instead — too complex, drop smallest meld anyway
      break;
    }
    cover.melds.splice(dropIdx, 1);
    melds = cover.melds.map(m => m.tiles);
    used = melds.reduce((s, m) => s + m.length, 0);
  }
  return melds;
}

/* exports */
const Engine = {
  COLORS, COLOR_TR,
  createTileSet, shuffle, okeyFromIndicator, isOkeyTile, effective, tileValue,
  validateMeld, validatePair, canAttach, sortRunTiles, splitRunTiles,
  bestMeldCover, bestSingleMeld, bestPairCover,
  newGame, startRound, prevPlayer, nextPlayer, lastDiscardOfPrev,
  drawFromDeck, takeDiscard, returnDiscard, openHand, undoOpen, layMeld, layPair, attachTile,
  discardTile, endRound, checkAllPairsCancel, isPenaltyDiscard,
  canSwapFake, canSwapWith, swapForOkey, swapFakeForOkey,
  aiTakeTurn, aiChooseDiscard, aiUsefulness, trimCoverForOpen, openReq,
};
if (typeof module !== 'undefined' && module.exports) module.exports = Engine;
if (typeof window !== 'undefined') window.Engine = Engine;

/* rizikolu odaları: albüm kapağı gibi kaydırmalı GÖSTERİŞLİ kartlar — OTUR: anında masaya */
const RIZ_ROOMS = [
  { ad: 'ÇIRAK ŞİMŞEĞİ',   ico: '🌩️', bahis: 2000,    min: 7000,     max: 40000 },
  { ad: 'YILDIRIM SOFRASI', ico: '⚡', bahis: 10000,   min: 35000,    max: 200000 },
  { ad: 'FIRTINA MASASI',   ico: '🌪️', bahis: 36000,   min: 126000,   max: 750000 },
  { ad: 'GÖK GÜRÜLTÜSÜ',    ico: '🌩️', bahis: 100000,  min: 350000,   max: 2000000 },
  { ad: 'KASIRGA KULÜBÜ',   ico: '🌀', bahis: 500000,  min: 1750000,  max: 10000000 },
  { ad: 'ZEUS\'UN SARAYI',  ico: '🏛️', bahis: 2000000, min: 7000000,  max: 0 },
];
function rizDialog() {
  const w = walletChips();
  // ilk uygun oda ortaya gelsin
  let firstOk = RIZ_ROOMS.findIndex(r => w >= r.min && (!r.max || w <= r.max));
  if (firstOk < 0) firstOk = 0;
  const cards = RIZ_ROOMS.map((r, i) => {
    const ok = w >= r.min && (!r.max || w <= r.max);
    const why = w < r.min ? '🔒 En az ' + fmtChips(r.min) + ' çip gerekir' : '🔒 Bakiyen tavanı aşıyor';
    return '<div class="rzcard' + (ok ? '' : ' locked') + '">' +
      '<div class="rzico">' + r.ico + '</div>' +
      '<div class="rzname">' + r.ad + '</div>' +
      '<div class="rzbetlbl">MASA BAHİSİ</div>' +
      '<div class="rzbet"><span class="coin">M</span> ' + fmtChips(r.bahis) + '</div>' +
      '<div class="rzmm"><span>Min. Giriş<br><b>' + fmtChips(r.min) + '</b></span>' +
      '<span>Max. Giriş<br><b>' + (r.max ? fmtChips(r.max) : '∞') + '</b></span></div>' +
      (ok ? '<button class="btn rzgo" data-rz="' + i + '">⚡ HEMEN OYNA</button>'
          : '<div class="rzlock">' + why + '</div>') +
      '</div>';
  }).join('');
  modal('<h2>⚡ RİZİKOLU ODALAR</h2>' +
    '<div class="rzwrap" id="rz-wrap">' + cards + '</div>' +
    '<p class="rules" style="text-align:center;font-size:10.5px;opacity:.85">← kaydırarak oda seç · çarpan büyüdükçe kazanç katlanır (okeyin sayısı, ★, masaya inen okey +1 · bitiş +1 · elden +2 · okeyle +4)</p>' +
    '<div class="btnrow"><button class="btn" onclick="window.closeModal()">Kapat</button></div>');
  const wrap = $('rz-wrap');
  setTimeout(() => { // modal yerleştikten sonra: uygun ilk oda ortalanır
    const el0 = wrap.children[firstOk];
    if (el0) wrap.scrollLeft = el0.offsetLeft - (wrap.clientWidth - el0.clientWidth) / 2;
  }, 60);
  document.querySelectorAll('#modal-box [data-rz]').forEach(b => b.onclick = () => {
    const r = RIZ_ROOMS[+b.dataset.rz];
    closeModal();
    netTry(ok => {
      if (ok) netJoin(r.bahis, 1, { rizikolu: true, katlamali: settings.katlamali }, settings.yardimli);
      else {
        toast('Sunucuya ulaşılamadı — çevrimdışı pratik modu.', true);
        launch({ room: settings.room, bahis: r.bahis, el: 1, yardimli: settings.yardimli, katlamali: settings.katlamali, rizikolu: true });
      }
    });
  });
}

/* ---- ana menü ayarları: genel + hemen oyna tercihleri + nasıl oynanır ---- */
function menuSettings() {
  const P = [
    ['muzik', '🎵 Müzik'], ['ses', '🔊 Oyun Sesi'], ['titresim', '📳 Titreşim'],
    ['arkadaslik', '👥 Arkadaşlık İstekleri'], ['sohbet', '💬 Sohbet'],
    ['davet', '📨 Masa Daveti'], ['bildirim', '🔔 Bildirimler'],
  ];
  const CY = [
    ['el', '🃏 EL SAYISI', v => v ? v + ' EL' : 'FARKETMEZ'],
    ['mod', '🤝 TEK / EŞLİ', v => v === 'tek' ? 'TEK' : v === 'esli' ? 'EŞLİ' : 'FARKETMEZ'],
    ['yard', '💡 YARDIM', v => v === 'yard' ? 'YARDIMLI' : v === 'no' ? 'YARDIMSIZ' : 'FARKETMEZ'],
    ['kat', '📈 KATLAMA', v => v === 'kat' ? 'KATLAMALI' : v === 'no' ? 'KATLAMASIZ' : 'FARKETMEZ'],
  ];
  modal('<h2>⚙ AYARLAR</h2><h3 class="setsec">GENEL</h3>' +
    P.map(([k, l]) => '<div class="dlg-row"><span class="lbl">' + l + '</span><span class="dlg-toggle ' + (prefs[k] ? 'on' : '') + '" data-p="' + k + '">' + (prefs[k] ? 'AÇIK' : 'KAPALI') + '</span></div>').join('') +
    '<h3 class="setsec">HEMEN OYNA TERCİHLERİ</h3>' +
    CY.map(([k, l, f]) => '<div class="dlg-row"><span class="lbl">' + l + '</span><span class="dlg-toggle on" data-c="' + k + '">' + f(qp[k]) + '</span></div>').join('') +
    '<h3 class="setsec">YARDIM</h3>' +
    '<div class="dlg-row"><span class="lbl">📖 Nasıl Oynanır</span><button class="btn secondary small" id="ms-rules">Göster</button></div>' +
    '<div class="btnrow"><button class="btn" onclick="window.closeModal()">Kapat</button></div>');
  document.querySelectorAll('#modal-box [data-p]').forEach(b => b.onclick = () => {
    const k = b.dataset.p;
    prefs[k] = !prefs[k];
    store.set('okey101_prefs', prefs);
    b.textContent = prefs[k] ? 'AÇIK' : 'KAPALI';
    b.classList.toggle('on', prefs[k]);
  });
  const cycles = { el: [0, 1, 2, 3, 4, 5], mod: ['any', 'tek', 'esli'], yard: ['any', 'yard', 'no'], kat: ['any', 'kat', 'no'] };
  document.querySelectorAll('#modal-box [data-c]').forEach(b => b.onclick = () => {
    const k = b.dataset.c, arr = cycles[k];
    qp[k] = arr[(arr.indexOf(qp[k]) + 1) % arr.length];
    store.set('okey101_qp', qp);
    b.textContent = CY.find(c => c[0] === k)[2](qp[k]);
  });
  $('ms-rules').onclick = () => { closeModal(); showRules(); };
}

/* ---- oda başlığı: oklar hep aynı yerde, uçlarda durur (başa sarmaz) ---- */
function walletChips() { return (typeof netReady === 'function' && netReady()) ? NET.user.chips : meta.chips; } // online: sunucu cüzdanı
function roomRich(room) { return room.tavan > 0 && walletChips() > room.tavan; } // bakiye tavanı aşarsa giremez
function roomHeadHtml(ri) {
  const room = ROOMS[ri];
  const locked = walletChips() < room.giris;
  const note = locked ? ' · 🔒 Giriş şartı: ' + fmtChips(room.giris)
    : roomRich(room) ? ' · 💰 Tavan ' + fmtChips(room.tavan) + ' — bakiyen çok yüksek' : '';
  return '<div class="roomnav">' +
    '<button class="navbtn" id="dg-prev"' + (ri === 0 ? ' disabled' : '') + '>◀</button>' +
    '<div class="roomhead"><div class="rico">' + room.ico + '</div>' +
    '<div class="rname">' + room.name + '</div>' +
    '<div class="rrange"><span class="coin">M</span> ' + fmtChips(room.min) + ' – ' + fmtChips(room.max) + '</div>' +
    '<div class="ronline">' + fakeOnline(1000 + ri * 400) + ' çevrimiçi' + note + '</div></div>' +
    '<button class="navbtn" id="dg-next"' + (ri === ROOMS.length - 1 ? ' disabled' : '') + '>▶</button></div>';
}
function bindRoomNav(ri, open) {
  $('dg-prev').onclick = () => { if (ri > 0) { closeModal(); open(ri - 1); } };
  $('dg-next').onclick = () => { if (ri < ROOMS.length - 1) { closeModal(); open(ri + 1); } };
}

/* ---- MASA AÇ: kendi masanı kur ---- */
function masaAcDialog(ri) {
  ri = Math.max(0, ri);
  const room = ROOMS[ri];
  const myChips = walletChips(); // online: sunucu cüzdanı geçerli
  const locked = myChips < room.giris;
  const maxB = Math.min(room.max, Math.max(room.min, myChips));
  let bahis = Math.min(Math.max(settings.bahis, room.min), maxB);
  let el = Math.min(5, Math.max(1, settings.el || 3));
  let yard = settings.yardimli, kat = settings.katlamali, esli = !!settings.esli;
  const canPlay = !locked && !roomRich(room) && myChips >= room.min;
  modal(
    roomHeadHtml(ri) +
    '<div class="dlg-row"><span class="lbl">BAHİS</span><span class="val" id="dg-bval"><span class="coin">M</span> ' + fmtChips(bahis) + '</span></div>' +
    '<input type="range" class="bahis" id="dg-bahis" min="' + room.min + '" max="' + maxB + '" step="1" value="' + bahis + '"' + (canPlay ? '' : ' disabled') + '>' +
    '<div class="dlg-row"><span class="lbl">🎙 SESLİ SOHBET</span><span class="dlg-toggle dis">KAPALI · Yakında</span></div>' +
    '<div class="dlg-row"><span class="lbl">EL SAYISI</span><span class="val" id="dg-elval">' + el + ' EL</span></div>' +
    '<input type="range" class="bahis" id="dg-el" min="1" max="5" step="1" value="' + el + '">' +
    '<div class="dlg-row"><span class="lbl">Yardımlı / Yardımsız</span><span class="dlg-toggle" id="dg-yard"></span></div>' +
    '<div class="dlg-row"><span class="lbl">Katlamalı / Katlamasız</span><span class="dlg-toggle" id="dg-kat"></span></div>' +
    '<div class="dlg-row"><span class="lbl">Tek / Eşli</span><span class="dlg-toggle" id="dg-esli"></span></div>' +
    '<div class="btnrow"><button class="btn secondary" id="dg-x">✕</button><button class="btn" id="dg-ok"' + (canPlay ? '' : ' disabled') + '>✓ MASAYI AÇ</button></div>'
  );
  const bval = $('dg-bval'), slider = $('dg-bahis');
  slider.oninput = () => { bahis = +slider.value; bval.innerHTML = '<span class="coin">M</span> ' + fmtChips(bahis); };
  const elval = $('dg-elval'), elSlider = $('dg-el');
  elSlider.oninput = () => { el = +elSlider.value; elval.textContent = el + ' EL'; };
  const yardBtn = $('dg-yard'), katBtn = $('dg-kat'), esliBtn = $('dg-esli');
  const drawT = () => {
    yardBtn.textContent = yard ? 'YARDIMLI' : 'YARDIMSIZ';
    yardBtn.className = 'dlg-toggle ' + (yard ? 'on' : 'warn');
    katBtn.textContent = kat ? 'KATLAMALI' : 'KATLAMASIZ';
    katBtn.className = 'dlg-toggle ' + (kat ? 'warn' : 'on');
    esliBtn.textContent = esli ? 'EŞLİ' : 'TEK';
    esliBtn.className = 'dlg-toggle ' + (esli ? 'warn' : 'on');
  };
  yardBtn.onclick = () => { yard = !yard; drawT(); };
  katBtn.onclick = () => { kat = !kat; drawT(); };
  esliBtn.onclick = () => { esli = !esli; drawT(); };
  drawT();
  bindRoomNav(ri, masaAcDialog);
  $('dg-x').onclick = closeModal;
  $('dg-ok').onclick = () => {
    closeModal();
    netTry(ok => {
      if (ok) netJoin(bahis, el, { esli, katlamali: kat }, yard);
      else {
        toast('Sunucuya ulaşılamadı — çevrimdışı pratik modu.', true);
        launch({ room: room.id, bahis, el, yardimli: yard, katlamali: kat, esli });
      }
    });
  };
}

/* ---- ODA SEÇ: oda kuralları → masa listesi ---- */
function odaSecDialog(ri) {
  ri = Math.max(0, ri);
  const room = ROOMS[ri];
  const locked = walletChips() < room.giris;
  modal(
    roomHeadHtml(ri) +
    '<div class="dlg-row"><span class="lbl">🃏 EL SAYISI</span><span class="val">1 – 5 (masaya göre)</span></div>' +

/* ---------------- rack ---------------- */
function me() { return G.players[0]; }
function handById(id) { return me().hand.find(t => t.id === id); }

function syncRack() {
  const ids = new Set(me().hand.map(t => t.id));
  for (let i = 0; i < RACK_SLOTS; i++) {
    if (rackSlots[i] != null && !ids.has(rackSlots[i])) rackSlots[i] = null;
  }
  for (const hid of [...ui.hiddenOkeys]) if (!ids.has(hid)) ui.hiddenOkeys.delete(hid);
  const placed = new Set(rackSlots.filter(x => x != null));
  for (const t of me().hand) {
    if (placed.has(t.id)) continue;
    // online: desteden slota sürüklendiyse taş tam o slota iner
    if (typeof NET !== 'undefined' && NET.pendingSlot != null && rackSlots[NET.pendingSlot] == null) {
      rackSlots[NET.pendingSlot] = t.id;
      NET.pendingSlot = null;
      placed.add(t.id);
      continue;
    }
    let idx = -1, last = -1;
    for (let i = 0; i < RACK_SLOTS; i++) if (rackSlots[i] != null) last = i;
    if (last + 2 < RACK_SLOTS && rackSlots[last + 2] == null) idx = last + 2;
    else if (last + 1 < RACK_SLOTS && rackSlots[last + 1] == null) idx = last + 1;
    else idx = rackSlots.indexOf(null);
    if (idx >= 0) rackSlots[idx] = t.id;
    placed.add(t.id);
  }
}

function sortRack(mode) {
  syncRack();
  const hand = me().hand.slice();
  let groups = [], leftovers = [];
  if (mode === 'pairs') {
    const pairs = E.bestPairCover(hand, G.okey);
    groups = pairs.map(p => p.slice());
    const used = new Set(groups.flat().map(t => t.id));
    leftovers = hand.filter(t => !used.has(t.id));
    leftovers.sort((a, b) => keyGroup(a) - keyGroup(b));
  } else {
    const cover = E.bestMeldCover(hand, G.okey);
    groups = cover.melds.map(m => sortMeldForDisplay(m.tiles));
    groups.sort((a, b) => meldPts(b) - meldPts(a)); // biggest first, side by side
    leftovers = cover.leftover.slice();
    leftovers.sort((a, b) => keyRun(a) - keyRun(b));
  }
  arrangeWithGaps(groups, leftovers);
}
function meldPts(tiles) { const v = E.validateMeld(tiles, G.okey); return v.valid ? v.points : 0; }
function keyRun(t) { const e = E.effective(t, G.okey); return e ? e.color * 20 + e.num : 999; }
function keyGroup(t) { const e = E.effective(t, G.okey); return e ? e.num * 10 + e.color : 999; }
function sortMeldForDisplay(tiles) {
  const v = E.validateMeld(tiles, G.okey);
  if (v.type === 'run') return E.sortRunTiles(tiles, G.okey);
  return [...tiles].sort((a, b) => keyGroup(a) - keyGroup(b));
}

function arrangeWithGaps(groups, leftovers) {
  const slots = new Array(RACK_SLOTS).fill(null);
  let pos = 0, gapless = false;
  const blocks = groups.concat(leftovers.length ? [leftovers] : []);
  for (const block of blocks) {
    if (!gapless) {
      const row = Math.floor(pos / RACK_COLS);
      const rowEnd = (row + 1) * RACK_COLS;
      if (pos + block.length > rowEnd && block.length <= RACK_COLS) pos = rowEnd;
      if (pos + block.length > RACK_SLOTS) { gapless = true; pos = compact(slots); }
    }
    if (pos + block.length > RACK_SLOTS) { gapless = true; pos = compact(slots); }
    for (const t of block) { if (pos < RACK_SLOTS) slots[pos++] = t.id; }
    if (!gapless) pos++;
  }
  const placed = new Set(slots.filter(x => x != null));
  for (const t of me().hand) {
    if (!placed.has(t.id)) {
      const i = slots.indexOf(null);
      if (i >= 0) { slots[i] = t.id; placed.add(t.id); }
    }
  }
  rackSlots = slots;
}
function compact(slots) {
  const ids = slots.filter(x => x != null);
  slots.fill(null);
  ids.forEach((id, i) => { slots[i] = id; });
  return ids.length;
}

function parseRackGroups() {
  syncRack();
  const groups = [];
  for (let r = 0; r < RACK_SLOTS / RACK_COLS; r++) {
    let cur = [];
    for (let c = 0; c < RACK_COLS; c++) {
      const id = rackSlots[r * RACK_COLS + c];
      if (id != null) {
        const t = handById(id);
        if (t) cur.push(t);
      } else if (cur.length) { groups.push(cur); cur = []; }
    }
    if (cur.length) groups.push(cur);
  }
  return groups;
}
/* seri, rafta ancak 11-12-13 gibi ARDIŞIK dizilirse geçerli sayılır (11-13-12 sayılmaz) */
function orderedRun(tiles) {
  const chk = dir => {
    let expect = null;
    for (const t of tiles) {
      const e = E.effective(t, G.okey);
      if (!e) { if (expect != null) expect += dir; continue; } // okey/★ sıradaki yeri doldurur
      if (expect != null && e.num !== expect) return false;
      expect = e.num + dir;
    }
    return true;
  };
  return chk(1) || chk(-1); // artan da azalan da kabul
}
/* performans: analiz render başına bir kez hesaplanır (telefon kasmasına karşı) */
let _an = null;
function analyzeRack() {
  if (_an) return _an;
  const groups = parseRackGroups();
  const melds = [], pairs = [];
  let meldPtsTotal = 0;
  const meldIds = new Set(), pairIds = new Set(), islekIds = new Set();
  for (const g of groups) {
    if (g.length >= 3) {
      const v = E.validateMeld(g, G.okey);
      if (v.valid && (v.type !== 'run' || orderedRun(g))) {
        melds.push(g); meldPtsTotal += v.points;
        g.forEach(t => meldIds.add(t.id));
      }
    } else if (g.length === 2) {
      const v = E.validatePair(g, G.okey);
      if (v.valid) { pairs.push(g); g.forEach(t => pairIds.add(t.id)); }
    }
  }
  if (G.tableMelds.length) {
    for (const t of me().hand) {
      if (meldIds.has(t.id) || pairIds.has(t.id)) continue;
      if (isWild(t) || t.fake) continue;
      if (G.tableMelds.some(m => E.canAttach(m, t, G.okey))) islekIds.add(t.id);
    }
  }
  return (_an = { melds, meldPts: meldPtsTotal, pairs, meldIds, pairIds, islekIds });
}

/* mechanical tally counter; çift modunda kırmızı risk değeri gösterir */
function renderCounter() {
  const c = $('counter');
  if (!G || G.roundOver) { c.classList.add('hidden'); return; } // sayaç her modda görünür
  const a = analyzeRack();
  let val, risk = false;
  if (me().opened && me().openType === 'pairs') {
    // çift açan: elde kalan taşların ×2 cezası her daim kırmızı görünür
    val = me().hand.reduce((s, t) => s + E.tileValue(t, G.okey), 0) * 2;
    risk = true;
  } else if (ui.counterMode === 'cift' && a.pairs.length >= 5) {
    const pairIds = a.pairIds;
    const left = me().hand.filter(t => !pairIds.has(t.id));
    val = left.reduce((s, t) => s + E.tileValue(t, G.okey), 0) * 2;
    risk = true;
  } else {
    val = a.meldPts;
  }
  val = Math.min(999, val);
  const str = String(val).padStart(3, '0');
  c.classList.remove('hidden');
  c.classList.toggle('risk', risk);
  const reqS = me().opened ? 101 : E.openReq(G).seri;
  c.classList.toggle('ready', !risk && a.meldPts >= reqS);
  c.title = risk
    ? 'Çift açarsan elinde kalacak ceza (kalan taşlar × 2)'
    : 'Geçerli perlerinin toplamı' + (reqS > 101 ? ' · Açış barajı: ' + reqS : '') + (a.pairs.length ? ' · ' + a.pairs.length + ' çift' : '');
  if (!c.dataset.init) {
    c.innerHTML = '<div class="dig"><span>0</span></div><div class="dig"><span>0</span></div><div class="dig"><span>0</span></div>';
    c.dataset.init = '1';
  }
  const digs = c.querySelectorAll('.dig span');
  str.split('').forEach((ch, i) => {
    const s = digs[i];
    if (s.textContent !== ch) {
      s.textContent = ch;
      s.classList.remove('roll'); void s.offsetWidth; s.classList.add('roll');
    }
  });
}

function renderMelds() {
  // düzenli masa: tüm perler sayıya (sonra renge) göre sıralı — "görünmez düzen"
  const seri = $('board-seri');
  const cift = $('board-cift');
  // FLIP: mevcut perlerin eski konumları — yeni per girince diğerleri IŞINLANMAZ, kayar
  const oldPos = {};
  document.querySelectorAll('#boards .meld[data-mi]').forEach(el => { oldPos[el.dataset.mi] = el.getBoundingClientRect(); });
  seri.innerHTML = ''; cift.innerHTML = '';
  const startOf = m => Math.min(...m.tiles.map(t => {
    const e = E.effective(t, G.okey);
    return e ? e.num : 14;
  }));
  const colorOf = m => {
    const e = m.tiles.map(t => E.effective(t, G.okey)).find(Boolean);
    return e ? e.color : 9;
  };
  const all = G.tableMelds.map((m, mi) => ({ m, mi }));
  const byNum = (a, b) => startOf(a.m) - startOf(b.m) || colorOf(a.m) - colorOf(b.m) || a.mi - b.mi;
  const melds = all.filter(x => x.m.type !== 'pair').sort(byNum);
  const pairs = all.filter(x => x.m.type === 'pair').sort(byNum);
  if (melds.length) seri.appendChild(meldRowEl(melds));
  if (pairs.length) cift.appendChild(meldRowEl(pairs));
  document.querySelectorAll('#boards .meld[data-mi]').forEach(el => {
    const o = oldPos[el.dataset.mi];
    if (!o) return;
    const n = el.getBoundingClientRect();
    const dx = o.left - n.left, dy = o.top - n.top;
    if (!dx && !dy) return;
    el.style.transition = 'none';
    el.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    requestAnimationFrame(() => {
      el.style.transition = 'transform .3s ease';
      el.style.transform = '';
      setTimeout(() => { el.style.transition = ''; }, 340);
    });
  });
}
function meldRowEl(items) {
  const row = document.createElement('div');
  row.className = 'meldrow';
  for (const { m, mi } of items) {
    const el = document.createElement('div');
    el.className = 'meld';
    el.dataset.mi = mi;
    const sorted = m.type === 'run' ? E.sortRunTiles(m.tiles, G.okey) : m.tiles;
    for (const t of sorted) {
      const te = tileEl(t, { mini: true });
      te.dataset.tid = t.id;
      el.appendChild(te);
    }
    row.appendChild(el);
  }
  return row;
}

function renderRack() {
  syncRack();
  const rack = $('rack');
  rack.innerHTML = '';
  // işlek/per halkaları HER ZAMAN görünür (sıra rakipteyken de)
  const a = !G.roundOver ? analyzeRack() : { meldIds: new Set(), pairIds: new Set(), islekIds: new Set() };
  for (let i = 0; i < RACK_SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot'; slot.dataset.idx = i;
    const id = rackSlots[i];
    if (id != null) {
      const t = handById(id);
      if (t) {

        const el = tileEl(t, { badge: !hidden, facedown: hidden });
        el.dataset.tid = t.id;

        }

        slot.appendChild(el);
      }

}

/* ---------------- drag / long-press system (v2: precise & smooth) ---------------- */
let drag = null;

function makeGhost(fromEl) {
  const r = fromEl.getBoundingClientRect();
  const g = fromEl.cloneNode(true);
  g.classList.add('ghost');
  g.classList.remove('dragging', 'sel', 'touch', 'gvalid', 'gpair', 'islk', 'drawnhl', 'grouplift');
  g.style.width = r.width + 'px'; g.style.height = r.height + 'px';
  g.style.left = r.left + 'px'; g.style.top = r.top + 'px';
  document.body.appendChild(g);
  return { g, x: r.left, y: r.top, w: r.width, h: r.height };
}
function makeGroupGhost(els) {
  const r0 = els[0].getBoundingClientRect();
  const wrap = document.createElement('div');
  wrap.className = 'ghostrow';
  for (const e of els) {
    const c = e.cloneNode(true);
    const rr = e.getBoundingClientRect();
    c.classList.remove('dragging', 'sel', 'touch', 'gvalid', 'gpair', 'islk', 'drawnhl', 'grouplift');
    c.style.width = rr.width + 'px';
    c.style.height = rr.height + 'px';
    wrap.appendChild(c);
  }
  wrap.style.left = r0.left + 'px'; wrap.style.top = r0.top + 'px';
  document.body.appendChild(wrap);
  return { g: wrap, x: r0.left, y: r0.top, w: r0.width, h: r0.height };
}
function endDrag() {
  if (!drag) return;
  clearTimeout(drag.holdTimer);
  if (drag.el) drag.el.classList.remove('dragging', 'touch');
  document.querySelectorAll('#rack .tile.grouplift').forEach(e => e.classList.remove('grouplift'));
  document.querySelectorAll('#rack .tile.dragging').forEach(e => e.classList.remove('dragging'));
  document.querySelectorAll('.meld.attach-ok, .meld.swappable').forEach(m => m.classList.remove('attach-ok', 'swappable'));
  if (drag.ghost) drag.ghost.remove();
  clearDropHints();
  drag = null;
  if (pendingRender) { pendingRender = false; render(); }
}
document.addEventListener('pointerup', () => { if (drag) { endDrag(); render(); } });
document.addEventListener('pointercancel', () => { if (drag) { endDrag(); render(); } });

function clearDropHints() {
  document.querySelectorAll('.slot.dragover').forEach(s => s.classList.remove('dragover'));
  document.querySelectorAll('.droptarget').forEach(s => s.classList.remove('droptarget'));
}
function hitAt(x, y) {
  const g = document.querySelector('.tile.ghost, .ghostrow');
  if (g) g.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  if (g) g.style.display = '';
  return el;
}
/* the drop position is where the GHOST TILE sits, not where the finger is —
   this is what makes drops land exactly where the player aims */
function ghostCenter() {
  if (!drag || !drag.ghost) return null;
  return { x: drag.gx + drag.dx + drag.gw / 2, y: drag.gy + drag.dy + drag.gh / 2 };
}
function moveGhost(dx, dy, scale, rot) {
  drag.dx = dx; drag.dy = dy;
  drag.ghost.style.transform = 'translate3d(' + dx + 'px,' + dy + 'px,0) scale(' + scale + ') rotate(' + rot + 'deg)';
}

function blockAt(id) {
  const idx = rackSlots.indexOf(id);
  if (idx < 0) return [id];
  const row = Math.floor(idx / RACK_COLS), rs = row * RACK_COLS, re = rs + RACK_COLS;
  let a = idx, b = idx;
  while (a - 1 >= rs && rackSlots[a - 1] != null) a--;
  while (b + 1 < re && rackSlots[b + 1] != null) b++;
  return rackSlots.slice(a, b + 1);
}
/* place a block at the target, displacing other tiles toward the row's gaps */
function placeGroup(ids, targetIdx) {
  const orig = ids.map(id => rackSlots.indexOf(id));
  const revert = () => { orig.forEach((p, k) => { rackSlots[p] = ids[k]; }); };
  orig.forEach(p => { rackSlots[p] = null; });
  const row = Math.floor(targetIdx / RACK_COLS), rs = row * RACK_COLS, re = rs + RACK_COLS;
  let start = Math.min(Math.max(targetIdx, rs), re - ids.length);
  if (start < rs) { revert(); return false; }
  const span = [];
  for (let k = 0; k < ids.length; k++) span.push(start + k);
  const displaced = span.map(i => rackSlots[i]).filter(x => x != null);
  const freeR = []; for (let i = start + ids.length; i < re; i++) if (rackSlots[i] == null) freeR.push(i);
  const freeL = []; for (let i = start - 1; i >= rs; i--) if (rackSlots[i] == null) freeL.push(i);
  if (displaced.length > freeR.length + freeL.length) { revert(); return false; }
  span.forEach(i => { rackSlots[i] = null; });
  let ri = 0, li = 0;
  for (const d of displaced) {
    if (ri < freeR.length) rackSlots[freeR[ri++]] = d;
    else rackSlots[freeL[li++]] = d;
  }
  ids.forEach((id, k) => { rackSlots[start + k] = id; });
  return true;
}
/* single tile: drop onto an occupied slot slides the row toward the nearest gap */
function moveTile(id, slotIdx) {
  const from = rackSlots.indexOf(id);
  if (from < 0 || slotIdx < 0 || slotIdx >= RACK_SLOTS || from === slotIdx) return;
  rackSlots[from] = null;
  if (rackSlots[slotIdx] == null) { rackSlots[slotIdx] = id; return; }
  const row = Math.floor(slotIdx / RACK_COLS), rs = row * RACK_COLS, re = rs + RACK_COLS;
  let e = -1;
  for (let i = slotIdx + 1; i < re; i++) if (rackSlots[i] == null) { e = i; break; }
  if (e >= 0) {
    for (let i = e; i > slotIdx; i--) rackSlots[i] = rackSlots[i - 1];
    rackSlots[slotIdx] = id;
    return;
  }
  for (let i = slotIdx - 1; i >= rs; i--) if (rackSlots[i] == null) { e = i; break; }
  if (e >= 0) {
    for (let i = e; i < slotIdx; i++) rackSlots[i] = rackSlots[i + 1];
    rackSlots[slotIdx] = id;
    return;
  }
  rackSlots[from] = rackSlots[slotIdx];
  rackSlots[slotIdx] = id;
}

function highlightTargetsFor(t) {
  if (!G || G.turn !== 0 || !G.hasDrawn || ui.busy || G.roundOver) return;
  document.querySelectorAll('.meld').forEach(el => {
    const m = G.tableMelds[+el.dataset.mi];
    if (!m || !me().opened) return;
    if (E.canSwapWith(G, m, t)) el.classList.add('swappable');
    else if (E.canAttach(m, t, G.okey)) el.classList.add('attach-ok');
  });
}

function attachRackPointer(el, t) {
  el.style.touchAction = 'none';
  el.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    if (drag) return;
    drag = { src: 'rack', id: t.id, x: ev.clientX, y: ev.clientY, moved: false, held: false, group: null,
             el, ghost: null, dx: 0, dy: 0, lastHX: -99, lastHY: -99 };
    el.classList.add('touch');
    try { el.setPointerCapture(ev.pointerId); } catch (e) {}
    drag.holdTimer = setTimeout(() => {
      if (!drag || drag.src !== 'rack' || drag.id !== t.id || drag.moved) return;
      drag.held = true;
      const block = blockAt(t.id);
      if (block.length >= 2) {
        drag.group = block;
        block.forEach(id => {
          const be = document.querySelector('#rack .tile[data-tid="' + id + '"]');
          if (be) be.classList.add('grouplift');
        });
      }
      if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
    }, HOLD_MS);
  });
  el.addEventListener('pointermove', (ev) => {
    if (!drag || drag.src !== 'rack' || drag.id !== t.id) return;
    const dx = ev.clientX - drag.x, dy = ev.clientY - drag.y;
    if (!drag.moved && Math.hypot(dx, dy) > 8) {
      clearTimeout(drag.holdTimer);
      drag.moved = true;
      el.classList.remove('touch');
      if (drag.group) {
        const els = drag.group.map(id => document.querySelector('#rack .tile[data-tid="' + id + '"]')).filter(Boolean);
        els.forEach(e2 => e2.classList.add('dragging'));
        const gh = makeGroupGhost(els);
        drag.ghost = gh.g; drag.gx = gh.x; drag.gy = gh.y; drag.gw = gh.w; drag.gh = gh.h;
      } else {
        el.classList.add('dragging');
        const gh = makeGhost(el);
        drag.ghost = gh.g; drag.gx = gh.x; drag.gy = gh.y; drag.gw = gh.w; drag.gh = gh.h;
        highlightTargetsFor(t);
      }
    }
    if (drag.moved) {
      moveGhost(dx, dy, drag.group ? 1.06 : 1.08, drag.group ? 1 : 2);
      const gc = ghostCenter();
      if (Math.hypot(gc.x - drag.lastHX, gc.y - drag.lastHY) > 4) {
        drag.lastHX = gc.x; drag.lastHY = gc.y;
        clearDropHints();
        if (drag.group) {
          const hit = hitAt(gc.x, gc.y);
          const slot = hit && hit.closest('.slot');
          if (slot) slot.classList.add('dragover');
        } else {
          const target = rackDropTarget(gc.x, gc.y, t);
          if (target && target.kind === 'slot') target.el.classList.add('dragover');
          else if (target) target.el.classList.add('droptarget');
        }
      }
    }
  });
  el.addEventListener('pointerup', (ev) => {
    if (!drag || drag.src !== 'rack' || drag.id !== t.id) return;
    const wasMoved = drag.moved, wasHeld = drag.held, group = drag.group;
    if (wasMoved) { drag.dx = ev.clientX - drag.x; drag.dy = ev.clientY - drag.y; }
    const gc = wasMoved ? ghostCenter() : null;
    const target = wasMoved
      ? (group
          ? (() => { const hit = hitAt(gc.x, gc.y); const s = hit && hit.closest('.slot'); return s ? { kind: 'slot', el: s } : null; })()
          : rackDropTarget(gc.x, gc.y, t))
      : null;
    endDrag();
    if (!wasMoved) {
      if (wasHeld) {
        if (!group && (E.isOkeyTile(t, G.okey) || t.fake)) { flipOkey(t.id); return; }
        render(); return;
      }
      onTileTap(t); return;
    }
    if (!target) { render(); return; }
    if (group) {
      if (!placeGroup(group, +target.el.dataset.idx)) toast('Grup için yeterli boşluk yok.', true);
      render(); return;
    }
    if (target.kind === 'slot') { moveTile(t.id, +target.el.dataset.idx); render(); }
    else if (target.kind === 'discard') dropDiscard(t);
    else if (target.kind === 'meld') dropAttach(t, +target.el.dataset.mi);
    else if (target.kind === 'swap') dropSwap(t, +target.el.dataset.mi);
    else if (target.kind === 'return') dropReturn();
  });
  el.addEventListener('pointercancel', () => endDrag());
}

/* okeyi ters çevir: yüzü kapalı boş taş görünümü; el açılınca geri döner */
function flipOkey(id) {
  const el = document.querySelector('#rack .tile[data-tid="' + id + '"]');
  const doToggle = () => {
    if (ui.hiddenOkeys.has(id)) ui.hiddenOkeys.delete(id);
    else ui.hiddenOkeys.add(id);
    render();
    const ne = document.querySelector('#rack .tile[data-tid="' + id + '"]');
    if (ne) {
      ne.style.transition = 'none';
      ne.style.transform = 'rotateY(-90deg)';
      requestAnimationFrame(() => {
        ne.style.transition = 'transform .14s ease-out';
        ne.style.transform = '';
        setTimeout(() => { ne.style.transition = ''; }, 170);
      });
    }
  };
  if (el) {
    el.style.transition = 'transform .13s ease-in';
    el.style.transform = 'rotateY(90deg)';
    setTimeout(doToggle, 130);
  } else doToggle();
}

function rackDropTarget(x, y, t) {
  const hit = hitAt(x, y);
  if (!hit) return null;
  const slot = hit.closest('.slot');
  if (slot) return { kind: 'slot', el: slot };
  const myTurn = G && G.turn === 0 && G.hasDrawn && !ui.busy && !G.roundOver;
  if (!myTurn) return null;
  if (me().tookDiscard === t.id) {
    const back = hit.closest('#corner-' + E.prevPlayer(G));
    if (back) return { kind: 'return', el: back };
  }
  const corner = hit.closest('#corner-0');
  if (corner) return { kind: 'discard', el: corner };
  const meld = hit.closest('.meld');
  if (meld && me().opened && meld.dataset.mi != null) {
    const m = G.tableMelds[+meld.dataset.mi];
    if (m) {
      if (E.canSwapWith(G, m, t)) return { kind: 'swap', el: meld };
      if (E.canAttach(m, t, G.okey)) return { kind: 'meld', el: meld };
    }
  }
  return null;
}

function attachSourcePointer(el, src) {
  el.style.touchAction = 'none';
  el.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    if (drag) return;
    drag = { src, x: ev.clientX, y: ev.clientY, moved: false, el, ghost: null, dx: 0, dy: 0, lastHX: -99, lastHY: -99 };
    el.classList.add('touch');
    try { el.setPointerCapture(ev.pointerId); } catch (e) {}
  });
  el.addEventListener('pointermove', (ev) => {
    if (!drag || drag.src !== src) return;
    const dx = ev.clientX - drag.x, dy = ev.clientY - drag.y;
    if (!drag.moved && Math.hypot(dx, dy) > 8) {
      drag.moved = true;
      el.classList.remove('touch');
      const gh = makeGhost(el);
      drag.ghost = gh.g; drag.gx = gh.x; drag.gy = gh.y; drag.gw = gh.w; drag.gh = gh.h;
    }
    if (drag.moved) {
      moveGhost(dx, dy, 1.08, 2);
      const gc = ghostCenter();
      if (Math.hypot(gc.x - drag.lastHX, gc.y - drag.lastHY) > 4) {
        drag.lastHX = gc.x; drag.lastHY = gc.y;
        clearDropHints();
        const hit = hitAt(gc.x, gc.y);
        const slot = hit && hit.closest('.slot');
        if (slot) slot.classList.add('dragover');
      }
    }
  });
  el.addEventListener('pointerup', (ev) => {
    if (!drag || drag.src !== src) return;
    const wasMoved = drag.moved;
    if (wasMoved) { drag.dx = ev.clientX - drag.x; drag.dy = ev.clientY - drag.y; }
    const gc = wasMoved ? ghostCenter() : null;
    const slot = wasMoved ? (() => { const h = hitAt(gc.x, gc.y); return h && h.closest('.slot'); })() : null;
    endDrag();
    if (!wasMoved) { src === 'deck' ? doDraw() : doTake(); return; }
    if (!slot) { render(); return; }
    const slotIdx = +slot.dataset.idx;
    if (NET.on) { NET.pendingSlot = slotIdx; NET.act(src === 'deck' ? 'draw' : 'take'); render(); return; }
    const t = src === 'deck' ? E.drawFromDeck(G) : E.takeDiscard(G);
    if (!t) { render(); return; }
    ui.drawnId = t.id;
    syncRack();
    moveTile(t.id, slotIdx);
    toast(src === 'deck' ? ('Çektin: ' + tileName(t)) : ('Aldın: ' + tileName(t) + ' — bu taşı bu tur kullanmalısın.'));
    render();
  });
  el.addEventListener('pointercancel', () => endDrag());
}

function dropDiscard(t) {
  if (NET.on) { NET.act('discard', { id: t.id }); ui.sel.clear(); return; }
  const r = E.discardTile(G, t);
  if (!r.ok) { toast(r.err, true); render(); return; }
  if (r.penalty) toast('⚠ İşlek taş attın: +101 ceza!', true);
  afterDiscard();
}
function dropAttach(t, mi) {
  if (NET.on) { NET.act('attach', { id: t.id, mi }); ui.sel.delete(t.id); return; }
  const r = E.attachTile(G, t, mi);
  if (!r.ok) { toast(r.err, true); render(); return; }
  ui.sel.delete(t.id);
  toast(tileName(t) + ' işlendi.');
  render();
  startTurnTimer(); // işlem yaptı: süre 30 sn baştan
}
function dropSwap(t, mi) {
  if (NET.on) { NET.act('swap', { id: t.id, mi }); ui.sel.clear(); return; }
  const r = E.swapForOkey(G, t, mi);
  if (!r.ok) { toast(r.err, true); render(); return; }
  startTurnTimer(); // değişim yaptı: süre baştan
  ui.sel.clear();
  ui.drawnId = r.okey.id;
  toast(tileName(t) + ' perdeki okeyle değişti — OKEY artık rafında! 🎉');
  render();
}
function dropReturn() {
  if (NET.on) { NET.act('return'); ui.sel.clear(); ui.drawnId = null; return; }
  const t = E.returnDiscard(G);
  ui.sel.clear(); ui.drawnId = null;
  if (t) toast('Taşı geri verdin — şimdi desteden çek.');
  render();
}

function onTileTap(t) {
  if (!G || ui.busy || G.roundOver) return;
  if (G.turn !== 0 || !G.hasDrawn) return;
  if (ui.sel.has(t.id)) ui.sel.delete(t.id);
  else { ui.sel.clear(); ui.sel.add(t.id); }
  render();
}

/* ---------------- turn timer (30/20/5 sn; açık el: 60 sn) ---------------- */
const TIMER_STEPS = [30, 20, 5];
let timerInt = null, timerDeadline = 0, timerTotal = 1;
/* süre barı ilgili oyuncunun koltuğunun hemen altına yerleşir */
function placeSeatTimer(idx) {
  const el = $('seat-' + idx), st = $('seattimer');
  if (!el || !st) return false;
  const r = el.getBoundingClientRect();
  const w = Math.max(44, Math.min(110, r.width));
  st.style.left = (r.left + r.width / 2 - w / 2) + 'px';
  st.style.width = w + 'px';
  st.style.top = (r.bottom + 3) + 'px';
  return true;
}
/* bot oynarken kısa süren akıcı bir bar (görsel eşitlik) */
function botSeatTimer(idx) {
  const st = $('seattimer'), sf = $('seatfill');
  if (!placeSeatTimer(idx)) return;
  st.classList.remove('hidden', 'low', 'anim');
  sf.style.width = '100%';
  void sf.offsetWidth;
  st.classList.add('anim');
  sf.style.width = '0%';
}
function startTurnTimer(durOverride) {
  if (NET.on) return; // online: süre sunucudan (netTick)
  stopTurnTimer();
  if (!G || G.roundOver || G.turn !== 0 || ui.busy) return;
  // 60 sn SADECE açış yapılan turda; sonraki turlar 30 sn (işlem yapınca 30 baştan sayar)
  const dur = durOverride || TIMER_STEPS[Math.min(ui.timeouts, TIMER_STEPS.length - 1)];
  timerTotal = dur;
  timerDeadline = Date.now() + dur * 1000;
  const st = $('seattimer');
  st.classList.remove('hidden', 'anim');
  placeSeatTimer(0);
  timerInt = setInterval(tickTimer, 200);
  tickTimer();
}
function stopTurnTimer() {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  const st = $('seattimer');
  if (st) { st.classList.add('hidden'); st.classList.remove('low', 'anim'); }
}
function tickTimer() {
  const remain = (timerDeadline - Date.now()) / 1000;
  const st = $('seattimer');
  if (!st) return;
  const pct = Math.max(0, Math.min(1, remain / timerTotal));
  $('seatfill').style.width = (pct * 100) + '%';
  st.classList.toggle('low', remain <= 5);
  placeSeatTimer(0);
  if (remain <= 0) onTurnTimeout();
}
function onTurnTimeout() {
  stopTurnTimer();
  if (!G || G.roundOver || G.turn !== 0) return;
  ui.timeouts++;
  // otomatik oyna: aldıysa geri ver, çekmediyse çek, sonra güvenli taş at
  if (me().tookDiscard != null) E.returnDiscard(G);
  if (!G.hasDrawn) {
    if (G.deck.length === 0) { E.endRound(G); render(); showRoundEnd(); return; }
    E.drawFromDeck(G);
  }
  const d = E.aiChooseDiscard(G, me());
  if (d) E.discardTile(G, d);
  toast('⏰ Süre doldu — senin yerine oynandı. (Sonraki süre: ' +
        (me().opened ? 60 : TIMER_STEPS[Math.min(ui.timeouts, 2)]) + ' sn)', true);
  ui.sel.clear(); ui.drawnId = null;
  render();
  if (G.roundOver) { showRoundEnd(); return; }
  botLoop();
}

/* ---------------- actions ---------------- */
function renderActions() {
  const bar = $('actions');
  bar.innerHTML = '';
  $('act-left').innerHTML = ''; // SERİ AÇ göstergenin solunda
  $('act-right').innerHTML = ''; // ÇİFT AÇ destenin sağında
  const mk = (label, fn, opts = {}) => {
    const b = document.createElement('button');
    b.className = 'btn small' + (opts.primary ? '' : ' secondary') + (opts.cls ? ' ' + opts.cls : '');

       { disabled: hp ? a.pairs.length < req.cift : !a.pairs.length, slot: 'act-right' });
  } else if (p.openType === 'normal') {
    mk('SERİ AÇ', () => doLayParsed(a), { disabled: !a.melds.length, slot: 'act-left' });
    if (otherPairsOpen) mk('ÇİFT AÇ' + (hp ? ' · ' + a.pairs.length : ''), () => doLayPairsParsed(a), { disabled: !a.pairs.length, slot: 'act-right' });
  } else {
    mk('ÇİFT AÇ', () => doLayPairsParsed(a), { disabled: !a.pairs.length, slot: 'act-right' });
  }
  if (p.opened && hp) { // İŞLE yardımcısı yardımsızda kapalı
    mk('İŞLE' + (a.islekIds.size ? ' · ' + a.islekIds.size : ''), () => doAutoIslek(),
       { primary: a.islekIds.size > 0, disabled: !a.islekIds.size || p.hand.length <= 1 });
  }
  const selIslek = hp && selTile && a.islekIds.has(selTile.id);
  mk('Taş At' + (selIslek ? ' ⚠' : ''), doDiscard, { primary: true, disabled: !selTile });
  if (p.tookDiscard != null) mk('Vazgeç ↩', dropReturn);
}

/* bot açışları: per, koltuğundan süzülerek masaya iner (herkes aynı şeyi görür) */
function seatSrcMap(idx, tiles) {

async function flyBotGroups(idx, events) {
  for (const e of events) {
    if ((e.type === 'open' || e.type === 'openPairs') && e.melds) {
      for (const tiles of e.melds) await flyGroup(tiles, seatSrcMap(idx, tiles));
    } else if ((e.type === 'lay' || e.type === 'layPair') && e.tiles) {
      await flyGroup(e.tiles, seatSrcMap(idx, e.tiles));
    } else if (e.type === 'attach' && e.tile) {
      await flyGroup([e.tile], seatSrcMap(idx, [e.tile]));
    } else if (e.type === 'discard' && e.tile) {
