function flyGroup(tiles, rects) {
  return new Promise(resolve => {
    const dests = tiles.map(t => document.querySelector('.meld .tile[data-tid="' + t.id + '"]')).filter(Boolean);
    const srcs = tiles.map(t => rects[t.id]).filter(Boolean);
    if (!dests.length || !srcs.length) { resolve(); return; }
    const left = Math.min(...srcs.map(r => r.left));
    const top = Math.min(...srcs.map(r => r.top));
    const wrap = document.createElement('div');
    wrap.className = 'flygroup';
    wrap.style.left = left + 'px'; wrap.style.top = top + 'px';
    for (const t of tiles) {
      const te = tileEl(t, { badge: true });
      te.style.width = srcs[0].width + 'px'; te.style.height = srcs[0].height + 'px';
      te.style.fontSize = (srcs[0].width * 0.52) + 'px';
      wrap.appendChild(te);
    }
    for (const d of dests) d.style.visibility = 'hidden';
    // hedef: taşların GERÇEK iniş noktası (per kutusunun köşesi değil) — kayma olmaz
    const drs = dests.map(d => d.getBoundingClientRect());
    const dl = Math.min(...drs.map(r => r.left));
    const dt = Math.min(...drs.map(r => r.top));
    const dr = drs[0];
    document.body.appendChild(wrap);
    requestAnimationFrame(() => {
      wrap.style.left = dl + 'px'; wrap.style.top = dt + 'px';
      wrap.querySelectorAll('.tile').forEach(te => {
        te.style.width = dr.width + 'px'; te.style.height = dr.height + 'px';
        te.style.fontSize = (dr.width * 0.52) + 'px';
      });
    });
    setTimeout(() => {
      wrap.remove();
      for (const d of dests) d.style.visibility = '';
      playSnd('tile'); // per masaya "tak" diye oturur
      setTimeout(resolve, 45);
    }, 280);
  });
}

/* ---- minik ses motoru: dosyasız WebAudio efektleri ---- */
let actx = null;
function sndOn() { return prefs.ses !== false && store.get('okey101_sound', true); }
function blip(freq, dur, type, vol, at) {
  const t = at || actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol || .2, t);
  g.gain.exponentialRampToValueAtTime(.001, t + (dur || .1));
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + (dur || .1) + .02);
}
/* "tak" — gerçek taş vuruşu: kısa gürültü patlaması (alçak geçiren süzgeçli) + gövde tınısı */
function knock(vol, freq, dur, at) {
  const t = at || actx.currentTime;
  const len = Math.max(1, Math.floor(actx.sampleRate * (dur || .06)));
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const f = actx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = freq || 1000; f.Q.value = 1.4;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol || .5, t);
  g.gain.exponentialRampToValueAtTime(.001, t + (dur || .06) + .02);
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start(t);
  blip(105 + Math.random() * 45, .05, 'sine', (vol || .5) * .55, t); // masaya oturan gövde
}
function playSnd(name, n) {
  if (!sndOn()) return;
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
  } catch (e) { return; }
  const t = actx.currentTime;
  if (name === 'tile') knock(.55, 900 + Math.random() * 550, .06, t);                 // tek taş "tak"
  else if (name === 'draw') knock(.22, 1800, .04, t);                                  // taş kaydırma
  else if (name === 'open') { knock(.45, 1250, .055, t); knock(.5, 1000, .06, t + .1); knock(.6, 780, .07, t + .2); } // per masaya inişi: tak-tak-tak
  else if (name === 'shuffle') for (let i = 0; i < 6; i++) knock(.13 + Math.random() * .1, 1300 + Math.random() * 800, .04, t + i * .05); // dağıtım hışırtısı
  else if (name === 'carpan') { knock(.6, 560, .09, t); blip(280 + (n || 2) * 55, .22, 'triangle', .1, t + .05); blip(560 + (n || 2) * 110, .3, 'sine', .12, t + .12); }
  else if (name === 'coin') [1568, 1976, 2637].forEach((f, i) => blip(f, .07, 'triangle', .05, t + i * .045));
  else if (name === 'jackpot') { // çuvala dökülen altınlar: şıkır şıkır
    knock(.45, 650, .09, t);
    for (let i = 0; i < 16; i++) {
      const tt = t + .06 + i * .05 + Math.random() * .035;
      const f = 1250 + Math.random() * 1900;
      blip(f, .05 + Math.random() * .05, 'triangle', .045 + Math.random() * .04, tt);
      if (Math.random() < .5) blip(f * 1.5, .04, 'sine', .03, tt + .012);
    }
    knock(.2, 900, .06, t + .5);
  }
  else if (name === 'win') { knock(.5, 900, .06, t); [523, 659, 784, 1046].forEach((f, i) => blip(f, .22, 'triangle', .13, t + .1 + i * .12)); }
  else if (name === 'lose') [392, 311, 233].forEach((f, i) => blip(f, .24, 'sine', .11, t + i * .15));
}

    render();
    await flyBotGroups(G.players.indexOf(p), events); // bot perleri de animasyonla iner
    await carpanWait(); // taşlar indi → çarpan oynar → sonra sıra geçer
    await sleep(420);
  }
  if (!G) return; // masadan çıkıldı
  ui.busy = false;
  render();
  if (G.roundOver) { showRoundEnd(); return; }
  startTurnTimer();
}
function describeEvents(name, events) {
  const msgs = [];
  for (const e of events) {
    if (e.type === 'draw') msgs.push(name + ' desteden çekti.');
    else if (e.type === 'take') msgs.push(name + ' atılan taşı aldı: ' + tileName(e.tile));
    else if (e.type === 'open') msgs.push('🔓 ' + name + ' elini açtı!');
    else if (e.type === 'openPairs') msgs.push('🔓 ' + name + ' ÇİFTTEN açtı!');
    else if (e.type === 'lay') msgs.push(name + ' yeni seri attı.');
    else if (e.type === 'layPair') msgs.push(name + ' çift attı.');
    else if (e.type === 'attach') msgs.push(name + ' taş işledi: ' + tileName(e.tile));
    else if (e.type === 'discard') msgs.push(name + (e.finished ? ' son taşını attı ve BİTİRDİ! 🎉' :
      ' attı: ' + tileName(e.tile) + (e.penalty ? ' (İŞLEK! +101 ceza)' : '')));
    else if (e.type === 'exhausted') msgs.push('Destede taş kalmadı — el bitti.');
  }
  return msgs.length > 4 ? [msgs[0], ...msgs.slice(1, -1).filter(m => m.includes('🔓') || m.includes('BİTİRDİ') || m.includes('İŞLEK')), msgs[msgs.length - 1]] : msgs;
}

/* ---------------- modals ---------------- */
function modal(html) {
  $('modal-box').innerHTML = html;
  $('modal').classList.remove('hidden');
}
function closeModal() {
  $('modal').classList.add('hidden');
  clearInterval(autoNextT); // otomatik devam sayacı varsa iptal
}
/* modal butonu geri sayımla kendiliğinden basılır (otomatik yeni el / yeni oyun) */
let autoNextT = null;
function armAutoNext(id, secs) {
  clearInterval(autoNextT);
  const b = $(id);
  if (!b) return;
  const base = b.textContent;
  let s = secs;
  b.textContent = base + ' (' + s + ')';
  autoNextT = setInterval(() => {
    const bb = $(id);
    if (!bb) { clearInterval(autoNextT); return; }
    s--;
    if (s <= 0) { clearInterval(autoNextT); bb.click(); }
    else bb.textContent = base + ' (' + s + ')';
  }, 1000);
}
window.closeModal = closeModal;

function showRoundEnd() {
  stopTurnTimer();
  render();
  if (G.cancelled) {
    modal('<h2>El İptal</h2><p class="rules">Dört oyuncu da çiftten açtı — bu el sayılmadı, yeni el başlıyor.</p>' +
      '<div class="btnrow"><button class="btn" onclick="window.__next()">Devam</button></div>');
    window.__next = () => { closeModal(); G.round--; G.cancelled = false; beginRound(); };
    return;
  }
  const fin = G.finisher;
  if (G.eldenBitti && fin === 0) { meta.stats.elden++; saveMeta(); }
  if (G.round >= G.rounds) { showFinal(); return; } // son el: ara ekran yok, direkt oyun sonucu
  let head = fin >= 0
    ? '🏁 ' + G.players[fin].name + ' eli bitirdi' +
      (G.eldenBitti ? ' — ELDEN BİTTİ!' : '') +
      (G.finishedWithOkey ? ' (okey ile!)' : '')
    : 'Destede taş kalmadı — herkesin elindeki taşlar sayıldı.';
  const rows = G.players.map((p, i) => resRow({
    crown: i === fin, win: i === fin,
    ava: avaOf(i),
    name: p.name, me: i === 0,
    sub: (p.roundScore > 0 ? '+' : '') + p.roundScore + ' el puanı',
    subCls: p.roundScore < 0 ? 'neg' : 'pos',
    right: p.score, rightSub: 'toplam',
  })).join('');
  let penNote = '';
  if (G.penaltyLog && G.penaltyLog.length) {
    const items = G.penaltyLog.map(e => G.players[e.player].name + ' +' + e.amount).join(' · ');
    penNote = '<p class="rules" style="font-size:12px;color:#ff8a80">⚠ İşlek/okey cezaları: ' + items + '</p>';
  }
  const teamNote = G.esli
    ? '<p class="rules" style="font-size:13px">🤝 Takımlar: Sen & ' + G.players[2].name + ': <b>' + (G.players[0].score + G.players[2].score) + '</b> · ' +
      G.players[1].name + ' & ' + G.players[3].name + ': <b>' + (G.players[1].score + G.players[3].score) + '</b></p>'
    : '';
  modal('<h2>EL SONUCU</h2><p class="reshead">' + head + '</p>' +
    '<div class="reslist">' + rows + '</div>' +
    teamNote + penNote +
    '<div class="btnrow"><button class="btn go" id="btn-nextel" onclick="window.__next()">SONRAKİ EL →</button></div>');
  window.__next = () => { closeModal(); beginRound(); };
  armAutoNext('btn-nextel', 6); // 6 sn sonra otomatik devam
}

/* oyun sonu satırı: avatar + isim + çip + puan (referans tasarım) */
const avaOf = i => (G && G.online && G.players[i] && G.players[i].ava) ? G.players[i].ava : (i === 0 ? '🙂' : BOT_AVAS[i - 1]);
function resRow(o) {
  return '<div class="resrow' + (o.win ? ' win' : '') + (o.me ? ' me' : '') + '">' +
    '<span class="rava">' + (o.crown ? '<span class="rcrown">👑</span>' : '') + o.ava + '</span>' +
    '<div class="rinfo"><b>' + escapeHtml(o.name) + '</b>' +
    (o.sub != null ? '<span class="rsub ' + (o.subCls || '') + '">' + o.sub + '</span>' : '') + '</div>' +
    '<div class="rright">' + (o.win ? '<span class="rwin">KAZANAN</span>' : '') +
    '<span class="rpts">' + o.right + '</span>' +
    (o.rightSub ? '<span class="rlbl">' + o.rightSub + '</span>' : '') + '</div></div>';
}

/* game over: rank + chip settlement (3x / 1x / 0 / 0 of the stake) + XP */
function showFinal() {
  if (G.esli) return showFinalEsli();
  const order = G.players.map((p, i) => ({ p, i })).sort((a, b) => a.p.score - b.p.score);
  const myRank = order.findIndex(o => o.i === 0);
  const stake = currentStake;
  const receiveMul = [3, 1, 0, 0];
  const riz = G.rizikolu ? (G.carpan || 1) : 0;
  let chipRows = '';
  let myReceive = 0;
  meta.stats.games++; if (myRank === 0) meta.stats.wins++;
  // bahisler oyun başında ödendi; burada yalnız ALINAN dağıtılır:
  // 1. → 3×bahis, 2. → bahsini geri alır, 3.-4. → 0
  // tek açan bitirdiyse pot süpürülür: kazanan 4 bahsi de alır, "ikinci" olmaz
  const sweep = !riz && G.soloOpen === order[0].i;
  order.forEach((o, rank) => {
    const receive = !stake ? 0 : riz
      ? (rank === 0 ? stake * riz + stake : rank === 1 ? stake : 0)
      : sweep
        ? (rank === 0 ? 4 * stake : 0)
        : receiveMul[rank] * stake;
    if (o.i === 0) myReceive = receive;
    chipRows += resRow({
      crown: rank === 0, win: rank === 0,
      ava: avaOf(o.i),
      name: (rank + 1) + '. ' + o.p.name, me: o.i === 0,
      sub: stake ? '<span class="coin">M</span> ' + (receive ? '+' + fmtChips(receive) : '0') : null,
      subCls: receive > stake ? 'neg' : (!receive && stake) ? 'pos' : '',
      right: o.p.score, rightSub: 'puan',
    });
  });
  if (myReceive > 0) meta.chips += myReceive;
  const lvBefore = levelOf(meta.xp);
  let xpGain = G.rounds * 25 + [100, 50, 20, 10][myRank];
  const noAssist = currentSettings && currentSettings.yardimli === false;
  if (noAssist) xpGain = Math.round(xpGain * 1.5); // yardımsız bonusu
  meta.xp += xpGain;
  const lvAfter = levelOf(meta.xp);
  let bonusNote = '';
  if (meta.chips < 1000) { meta.chips = 1000; bonusNote = '<p class="rules" style="font-size:12px">🎁 Çip yardımı: bakiyen 1.000\'e tamamlandı.</p>'; }
  saveMeta();
  const youWon = myRank === 0;
  modal('<h2>OYUN SONUCU</h2>' +
    '<p class="reshead">' + (youWon ? '🏆 Kazandın!' : order[0].p.name + ' kazandı') +
    (riz ? ' · <b class="rznote">⚡ Çarpan ×' + riz + '</b>' : '') +
    (sweep && stake ? ' · <b class="rznote">Tek açan — potun tamamını aldı!</b>' : '') + '</p>' +
    '<div class="reslist">' + chipRows + '</div>' +
    (lvAfter > lvBefore ? '<p class="rules" style="font-size:12px;text-align:center">🎉 <b>Seviye ' + lvAfter + '!</b></p>' : '') +
    '<div class="btnrow finalbtns"><button class="btn exit" onclick="window.__menu()">MASADAN AYRIL</button>' +
    '<button class="btn go" id="btn-newgame" onclick="window.__again()">YENİ OYUN</button></div>');
  if (myReceive > 0) setTimeout(() => chipFx(myReceive), 500);
  playSnd(youWon ? 'win' : 'lose');
  armAutoNext('btn-newgame', 10); // 10 sn sonra otomatik yeni oyun
  window.__again = () => { closeModal(); launch(currentSettings || settings); };
  window.__menu = () => { closeModal(); $('scr-game').classList.add('hidden'); $('scr-start').classList.remove('hidden'); initStart(); };
}

/* eşli final: takım puanları toplanır; kazanan takımın her oyuncusu net +bahis */
function showFinalEsli() {
  const stake = currentStake;
  const teams = [
    { names: G.players[0].name + ' & ' + G.players[2].name, score: G.players[0].score + G.players[2].score, mine: true },
    { names: G.players[1].name + ' & ' + G.players[3].name, score: G.players[1].score + G.players[3].score, mine: false },
  ].sort((a, b) => a.score - b.score);
  const tie = teams[0].score === teams[1].score;
  const myWin = teams[0].mine && !tie;
  // bahisler baştan ödendi: kazanan takım oyuncusu 2×bahis alır, berabere bahsini geri alır
  const myReceive = stake ? (tie ? stake : myWin ? 2 * stake : 0) : 0;
  meta.stats.games++; if (myWin) meta.stats.wins++;
  let chipRows = '';
  teams.forEach((t, rank) => {
    const receive = stake ? (tie ? stake : rank === 0 ? 2 * stake : 0) : 0;
    chipRows += resRow({
      crown: rank === 0 && !tie, win: rank === 0 && !tie,
      ava: t.mine ? '🙂' : '🧔🏻',
      name: (tie ? '=' : (rank + 1) + '.') + ' ' + t.names, me: t.mine,
      sub: stake ? '<span class="coin">M</span> ' + (receive ? '+' + fmtChips(receive) : '0') + '/kişi' : null,
      subCls: receive > stake ? 'neg' : (!receive && stake) ? 'pos' : '',
      right: t.score, rightSub: 'puan',
    });
  });
  if (myReceive > 0) meta.chips += myReceive;
  const lvBefore = levelOf(meta.xp);
  let xpGain = G.rounds * 25 + (myWin ? 100 : tie ? 50 : 20);
  const noAssist = currentSettings && currentSettings.yardimli === false;
  if (noAssist) xpGain = Math.round(xpGain * 1.5);
  meta.xp += xpGain;
  const lvAfter = levelOf(meta.xp);
  let bonusNote = '';
  if (meta.chips < 1000) { meta.chips = 1000; bonusNote = '<p class="rules" style="font-size:12px">🎁 Çip yardımı: bakiyen 1.000\'e tamamlandı.</p>'; }
  saveMeta();
  modal('<h2>OYUN SONUCU</h2>' +
    '<p class="reshead">' + (myWin ? '🏆 Takımın Kazandı!' : tie ? '🤝 Berabere!' : 'Rakip takım kazandı') + '</p>' +
    '<div class="reslist">' + chipRows + '</div>' +
    (lvAfter > lvBefore ? '<p class="rules" style="font-size:12px;text-align:center">🎉 <b>Seviye ' + lvAfter + '!</b></p>' : '') +
    '<div class="btnrow finalbtns"><button class="btn exit" onclick="window.__menu()">MASADAN AYRIL</button>' +
    '<button class="btn go" id="btn-newgame" onclick="window.__again()">YENİ OYUN</button></div>');
  if (myReceive > 0) setTimeout(() => chipFx(myReceive), 500);
  playSnd(myWin ? 'win' : 'lose');
  armAutoNext('btn-newgame', 10);
  window.__again = () => { closeModal(); launch(currentSettings || settings); };
  window.__menu = () => { closeModal(); $('scr-game').classList.add('hidden'); $('scr-start').classList.remove('hidden'); initStart(); };
}

/* ---------------- masa sohbeti ---------------- */
const chatState = { msgs: [], unread: 0 };
const CHAT_QUICK = ['Selam! 👋', 'Güzel el 👏', 'Hadi bakalım', 'Şanslıyım bugün 🍀', 'Okey bende 😏', 'Bu el benim 💪'];
const BOT_CHAT = {
  open: ['Açtım! 😎', 'Ben açıldım, sıra sizde 😉', 'İşte bu!'],
  finish: ['Bitti! 🎉', 'Güzel eldi, eyvallah 👏'],
  penalty: ['Off, ceza yedim 😤', 'Görmedim onu ya!'],
  idle: ['Taşlar hiç gelmiyor 😩', 'Çayları tazeleyin ☕', 'Acele etmeyin 🙂', 'Bu gösterge de bir şey değil 😅'],
  reply: ['🙂', 'Aynen öyle!', 'Bol şans!', 'Sana da 👍', '😄', 'Bakalım hocam', 'Eyvallah'],
};
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function escapeHtml(s) { return String(s).replace(/[<>&"]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c])); }
function addChat(name, text, mine) {
  chatState.msgs.push({ name, text, mine });
  if (chatState.msgs.length > 60) chatState.msgs.shift();
  if (!mine && $('chatpanel').classList.contains('hidden')) chatState.unread++;
  renderChat();
}
function renderChat() {
  const log = $('chatlog');
  if (!log) return;
  log.innerHTML = chatState.msgs.map(m =>
    '<div class="cmsg' + (m.mine ? ' me' : '') + '"><b>' + escapeHtml(m.name) + ':</b> ' + escapeHtml(m.text) + '</div>').join('');
  log.scrollTop = log.scrollHeight;
  const b = $('chat-badge');
  if (b) { b.classList.toggle('hidden', !chatState.unread); b.textContent = chatState.unread; }
}
function sendChat(txt) {
  txt = (txt || '').trim();
  if (!txt) return;
  if (NET.on) { netSend({ t: 'chat', text: txt }); return; } // sunucu herkese (bana da) yayınlar
  addChat(store.get('okey101_name', 'Sen'), txt, true);
  if (G && Math.random() < 0.8) setTimeout(() => {
    if (!G) return;
    addChat(G.players[1 + Math.floor(Math.random() * 3)].name, pick(BOT_CHAT.reply), false);
  }, 900 + Math.random() * 1600);
}
function maybeBotChat(p, events) {
  if (NET.on) return; // online: sadece gerçek sohbet
  for (const e of events) {
    if ((e.type === 'open' || e.type === 'openPairs') && Math.random() < 0.7) { addChat(p.name, pick(BOT_CHAT.open), false); return; }
    if (e.type === 'discard' && e.finished) { addChat(p.name, pick(BOT_CHAT.finish), false); return; }
    if (e.type === 'discard' && e.penalty) { addChat(p.name, pick(BOT_CHAT.penalty), false); return; }
  }
  if (Math.random() < 0.05) addChat(p.name, pick(BOT_CHAT.idle), false);
}
$('btn-chat').onclick = () => {
  $('chatpanel').classList.toggle('hidden');
  chatState.unread = 0;
  renderChat();
};
$('chat-x').onclick = () => $('chatpanel').classList.add('hidden');
$('chat-send').onclick = () => { sendChat($('chat-inp').value); $('chat-inp').value = ''; };
$('chat-inp').onkeydown = e => { if (e.key === 'Enter') { sendChat($('chat-inp').value); $('chat-inp').value = ''; } };
CHAT_QUICK.forEach(q => {
  const b = document.createElement('button');
  b.className = 'qmsg'; b.textContent = q;
  b.onclick = () => sendChat(q);
  $('chat-quick').appendChild(b);
});

/* ---- masadaki profile tıkla: oyuncu istatistik kartı (botlar temsili) ---- */
function botStats(name) {
  let h = 7;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) % 999983;
  const games = 240 + h % 4700;
  const winPct = 34 + h % 27;
  return {
    chips: 100000 + (h % 120) * 50000,
    lv: 4 + h % 26,
    games,
    wins: Math.round(games * winPct / 100),
    elden: 2 + h % 40,
    start: String(1 + h % 28).padStart(2, '0') + '.' + String(1 + h % 12).padStart(2, '0') + '.' + (2021 + h % 5),
  };
}

/* =====================================================================
   ONLİNE MOD (FAZ A3) — sunucu-otoriter oyun istemcisi
   Yerel G yerine sunucudan gelen koltuk-özel görüş; hamleler 'act' olarak
   sunucuya gider. Koltuk rotasyonu: benim koltuğum her zaman yerel 0'dır.
   ===================================================================== */
const NET = {
  on: false, ws: null, view: null, seat: -1,
  token: store.get('okey101_nettoken', null),
  pendingSlot: null, evQ: [], modalKind: null,
  lastDeadline: 0, tTotal: 0, lastTurnLoc: -1,
  lastStake: 1000, lastRounds: 1, user: null,
  stakeFxDone: false, leaving: false, retries: 0, tickInt: null,
};
function netDevId() {
  let d = store.get('okey101_devid', null);
  if (!d) { d = 'dev-' + Math.random().toString(36).slice(2) + Date.now().toString(36); store.set('okey101_devid', d); }
  return d;
}
function netUrl() {
  const host = location.host || 'localhost:8101';
  return (location.protocol === 'https:' ? 'wss://' : 'ws://') + host;
}
function netRot(srvSeat) { return (srvSeat - NET.seat + 4) % 4; }

function netConnect(onReady) {
  if (NET.ws && NET.ws.readyState === 1) { onReady && onReady(); return; }
  let ws;
  try { ws = new WebSocket(netUrl()); } catch (e) { toast('Sunucuya bağlanılamadı.', true); return; }
  NET.ws = ws;
  ws.onopen = () => {
    NET.retries = 0;
    ws.send(JSON.stringify(NET.token
      ? { t: 'hello', token: NET.token, deviceId: netDevId(), name: store.get('okey101_name', 'Sen') }
      : { t: 'hello', deviceId: netDevId(), name: store.get('okey101_name', 'Sen') }));
    NET._onReady = onReady;
  };
  ws.onmessage = e => { let m; try { m = JSON.parse(e.data); } catch (err) { return; } netMsg(m); };
  ws.onclose = () => {
    if (!NET.on || NET.leaving) return;
    netBanner('Bağlantı koptu — yeniden bağlanılıyor…');
    if (++NET.retries <= 20) setTimeout(() => netConnect(), 1600);
    else { netBanner(null); netExit('Bağlantı kurulamadı.'); }
  };
  ws.onerror = () => { try { ws.close(); } catch (e2) {} };
}
function netSend(o) { if (NET.ws && NET.ws.readyState === 1) NET.ws.send(JSON.stringify(o)); }
NET.act = (a, extra) => netSend(Object.assign({ t: 'act', a }, extra || {}));

function netBanner(txt) {
  let b = $('netbanner');
  if (!txt) { if (b) b.remove(); return; }
  if (!b) { b = document.createElement('div'); b.id = 'netbanner'; document.body.appendChild(b); }
  b.textContent = txt;
}

/* sunucu cüzdanı TEK gerçek: yerel meta ona eşitlenir (çip/seviye kaybolmaz) */
function netSetUser(u) {
  NET.user = u;
  if (u) {
    meta.chips = u.chips;
    if (typeof u.xp === 'number') meta.xp = u.xp;
    saveMeta();
  }
}
function netMsg(m) {
  switch (m.t) {
    case 'welcome':
      NET.token = m.token;
      store.set('okey101_nettoken', m.token);
      netSetUser(m.user);
      netBanner(null);
      if (!NET.on && !$('scr-start').classList.contains('hidden')) initStart(); // menüde sunucu bakiyesi görünsün
      if (NET._onReady) { const f = NET._onReady; NET._onReady = null; f(); }
      break;
    case 'joined':
      NET.seat = m.seat;
      NET.on = true;
      currentStake = m.stake;
      currentSettings = { online: true, yardimli: NET.pendingYard !== false, katlamali: true };
      document.querySelectorAll('.rackside').forEach(b => b.classList.toggle('hidden', NET.pendingYard === false));
      if (m.resumed) toast('Masana geri döndün — oyun kaldığı yerden.', false);
      break;
    case 'lobby': netRenderLobby(m); break;
    case 'pcard': netShowPcard(m); break;
    case 'me': netSetUser(m.user); if (!NET.on) initStart(); break;
    case 'daily':
      if (m.ok) {
        netSetUser(m.user);
        chipFx(m.reward);
        toast('🎁 Günlük bonus: +' + fmtChips(m.reward) + ' çip! (Seri: ' + m.streak + ' gün)');
        initStart();
      }
      break;
    case 'task':
      if (m.ok) {
        netSetUser(m.user);
        chipFx(m.odul);
        toast('🎯 Görev ödülü: +' + fmtChips(m.odul) + ' çip!');
        initStart();
        showProfile(); // pencere güncel haliyle yeniden
      }
      break;
    case 'buy':
      if (m.ok) {
        netSetUser(m.user);
        closeModal();
        playSnd('jackpot');
        chipFx.quiet = true;
        chipFx(m.chips);
        toast('🎉 ' + fmtChips(m.chips) + ' çip hesabına eklendi! (demo)');
        initStart();
        setTimeout(showShop, 900);
      } else { toast(m.msg || 'Satın alma başarısız.', true); closeModal(); showShop(); }
      break;
    case 'top': netShowTop(m); break;
    case 'waiting': netWaitingModal(m); break;
    case 'state': netApplyState(m.v); break;
    case 'ev': netStashEv(m); break;
    case 'roundEnd': netRoundEnd(m.s); break;
    case 'final': netFinal(m); break;
    case 'timeout': if (netRot(m.seat) === 0) toast('⏰ Süren doldu — senin yerine oynandı.', true); break;
    case 'chat': addChat(m.from, m.text, NET.on && netRot(m.seat) === 0); break;
    case 'err': toast(m.msg, true); break;
    case 'left': netExit(); break;
  }
}

/* sunucu görüşü → yerel G (koltuk rotasyonlu gölge durum) */
function gFromView(v) {
  const players = [0, 1, 2, 3].map(loc => {
    const srv = (loc + v.seat) % 4;
    const p = v.players[srv];
    return {
      name: p.name, ava: p.ava,
      hand: loc === 0 ? v.hand : [],
      opened: p.opened, openType: p.openType, openPoints: p.openPoints,
      penalty: p.penalty, score: p.score,
      tookDiscard: loc === 0 ? v.tookDiscard : null,
    };
  });
  return {
    online: true,
    round: v.round, rounds: v.rounds,
    turn: netRot(v.turn), hasDrawn: v.hasDrawn, roundOver: v.roundOver,
    okey: v.okey, indicator: v.indicator,
    deck: { length: v.deck },
    discards: [0, 1, 2, 3].map(loc => v.discards[(loc + v.seat) % 4]),
    tableMelds: v.tableMelds.map(mm => ({ owner: netRot(mm.owner), type: mm.type, tiles: mm.tiles })),
    players,
    katlamali: v.katlamali, carpan: v.carpan, esli: !!v.esli, rizikolu: !!v.rizikolu,
    soloOpen: -1, penaltyLog: [], finisher: -1,
    lastOpen: v.canUndo ? { player: 0 } : null,
    turnCounter: 0,
  };
}

function netApplyState(v) {
  const prevIds = (NET.on && G && G.online) ? new Set(G.players[0].hand.map(t => t.id)) : null;
  const newRound = !G || !G.online || G.round !== v.round;
  const prevOpen = (!newRound && G) ? G.players.map(p => p.opened) : null;
  NET.view = v;
  NET.seat = v.seat;
  if (v.deadline !== NET.lastDeadline) {
    NET.lastDeadline = v.deadline;
    NET.tTotal = v.deadline ? Math.max(1000, v.deadline - Date.now()) : 0;
    NET.snapBar = true; // yeni tur: bar dolu başlar, "geri dolma" animasyonu görünmez
  }
  G = gFromView(v);
  if (NET.modalKind === 'waiting') { closeModal(); NET.modalKind = null; }
  if (newRound) {
    rackSlots = new Array(RACK_SLOTS).fill(null);
    me().hand.forEach((t, i) => { rackSlots[i] = t.id; });
    sortRack('runs');
    ui.sel.clear(); ui.hiddenOkeys.clear(); ui.drawnId = null;
    ui.counterMode = 'seri';
    ui.lastCarpan = 1;
    if (NET.modalKind === 'round') { closeModal(); NET.modalKind = null; }
    playSnd('shuffle');
    if (!NET.stakeFxDone) { NET.stakeFxDone = true; setTimeout(() => chipFx(-currentStake), 600); }
  } else if (prevIds) {
    const added = me().hand.filter(t => !prevIds.has(t.id));
    if (added.length === 1 && G.turn === 0 && G.hasDrawn) ui.drawnId = added[0].id;
  }
  if (prevOpen) { // açış duyurusu: "Ayşe T. 112 sayılık SERİ açtı" (referans oyunlardaki gibi)
    for (let i = 1; i < 4; i++) {
      const p = G.players[i];
      if (p.opened && !prevOpen[i]) toast('📢 ' + p.name + ' ' + p.openPoints + ' sayılık ' + (p.openType === 'pairs' ? 'ÇİFT' : 'SERİ') + ' açtı');
    }
  }
  $('scr-start').classList.add('hidden');
  $('scr-game').classList.remove('hidden');
  document.querySelectorAll('.rackside').forEach(b => b.classList.remove('hidden'));
  render();
  netRunEvQ();
  if (G.turn !== NET.lastTurnLoc) {
    NET.lastTurnLoc = G.turn;
    if (!v.deadline && !G.roundOver) botSeatTimer(G.turn);
  }
  if (!NET.tickInt) NET.tickInt = setInterval(netTick, 250);
}

/* olaylar: kaynak konumlar state uygulanmadan yakalanır, render SONRASI oynatılır */
function netStashEv(m) {
  const loc = netRot(m.seat);
  const stash = { loc, events: m.events, rects: {} };
  if (loc === 0) {
    for (const e of m.events) {
      const tiles = e.melds ? e.melds.flat() : (e.tiles || (e.tile ? [e.tile] : []));
      for (const t of tiles) {
        const el = document.querySelector('#rack .tile[data-tid="' + t.id + '"]');
        if (el) stash.rects[t.id] = el.getBoundingClientRect();
      }
    }
  }
  NET.evQ.push(stash);
}
async function netRunEvQ() {
  const q = NET.evQ.splice(0);
  for (const s of q) {
    for (const e of s.events) {
      const srcMap = tiles => (s.loc === 0 && Object.keys(s.rects).length) ? s.rects : seatSrcMap(s.loc, tiles);
      if ((e.type === 'open' || e.type === 'openPairs') && e.melds) {
        for (const tiles of e.melds) await flyGroup(tiles, srcMap(tiles));
      } else if ((e.type === 'lay' || e.type === 'layPair') && e.tiles) {
        await flyGroup(e.tiles, srcMap(e.tiles));
      } else if (e.type === 'attach' && e.tile) {
        await flyGroup([e.tile], srcMap([e.tile]));
      } else if (e.type === 'discard' && e.tile) {
        const src = s.loc === 0 ? s.rects[e.tile.id] : seatSrcMap(s.loc, [e.tile])[e.tile.id];
        await flyToCorner(e.tile, src, s.loc);
        if (e.penalty && s.loc === 0) toast('⚠ İşlek taş attın: +101 ceza!', true);
      }
    }
  }
}

/* süre barı: sunucu deadline'ına göre (yerel sayaç yok) */
function netTick() {
  if (!NET.on || !NET.view || !G) return;
  const v = NET.view;
  const st = $('seattimer'), sf = $('seatfill');
  if (G.roundOver || !v.deadline) return;
  const remain = v.deadline - Date.now();
  if (remain <= 0) { st.classList.add('hidden'); return; }
  st.classList.remove('hidden', 'anim');
  placeSeatTimer(G.turn);
  const w = Math.max(0, Math.min(100, remain / (NET.tTotal || 30000) * 100)) + '%';
  if (NET.snapBar) { // tur değişimi: genişlik ANINDA oturur, sonra akıcı iner
    NET.snapBar = false;
    sf.style.transition = 'none';
    sf.style.width = w;
    void sf.offsetWidth;
    sf.style.transition = '';
  } else sf.style.width = w;
  st.classList.toggle('low', remain < 5000);
}

    el.innerHTML = '<div class="ava">' + (s ? (s.ava || '🙂') : '⏳') + '</div>' +
      '<div class="' + ((loc === 1 || loc === 3) ? 'vinfo' : 'info') + '"><span class="nm">' +
      (s ? escapeHtml(s.name) : 'Bekleniyor…') + '</span></div>';
  }
  $('msgbar').textContent = 'Oyuncular masaya oturuyor… (' + n + '/4)';
  $('actions').innerHTML = '<button class="btn small exit" id="nw-x">✕ MASADAN KALK</button>';
  $('nw-x').onclick = () => netSend({ t: 'leave' });
}

/* ---- gerçek lobi: sunucudaki bekleyen masalar (oda aralığına göre) ---- */
function netLobbyDialog(ri) {
  const room = ROOMS[ri];
  NET.modalKind = 'lobby';
  NET.lobbyRange = [room.min, room.max];
  modal(roomHeadHtml(ri) +
    '<div id="lobby-list" style="display:flex;flex-direction:column;gap:7px;max-height:44vh;overflow-y:auto">' +
    '<p class="rules" style="text-align:center">Masalar yükleniyor…</p></div>' +
    '<div class="btnrow"><button class="btn secondary" id="lb-new">➕ YENİ MASA AÇ</button><button class="btn" id="lb-x">Kapat</button></div>');
  bindRoomNav(ri, r => { netLobbyStop(); netLobbyDialog(r); });
  $('lb-x').onclick = () => { netLobbyStop(); closeModal(); };
  $('lb-new').onclick = () => { netLobbyStop(); closeModal(); masaAcDialog(ri); };
  netSend({ t: 'lobby' });
  NET.lobbyInt = setInterval(() => netSend({ t: 'lobby' }), 3000); // canlı yenilenir
}
function netLobbyStop() {
  clearInterval(NET.lobbyInt);
  NET.lobbyInt = null;
  if (NET.modalKind === 'lobby') NET.modalKind = null;
}
function netRenderLobby(m) {
  const list = $('lobby-list');
  if (NET.modalKind !== 'lobby' || !list) return;
  const mn = NET.lobbyRange ? NET.lobbyRange[0] : 0, mx = NET.lobbyRange ? NET.lobbyRange[1] : 1e15;
  const ts = m.tables.filter(t => t.stake >= mn && t.stake <= mx);
  list.innerHTML = ts.length ? ts.map(t => {
    const filled = t.seats.filter(Boolean);
    return '<div class="tablecard"><div class="tinfo">' +
      '<div class="tname"><span class="coin">M</span> ' + fmtChips(t.stake) + ' · ' + t.rounds + ' EL</div>' +
      '<div class="tmeta">' + (filled.map(s => (s.ava || '🙂') + ' ' + escapeHtml(s.name)).join(' · ') || 'Boş masa') + ' · ' + (4 - filled.length) + ' boş koltuk</div>' +
      '<div class="tags"><span class="tag kat">' + (t.katlamali ? 'KATLAMALI' : 'KATLAMASIZ') + '</span>' +
      (t.esli ? '<span class="tag">🤝 EŞLİ</span>' : '') + (t.rizikolu ? '<span class="tag">⚡ RİZİKOLU</span>' : '') + '</div></div>' +
      '<button class="btn small" data-tid="' + t.id + '">OTUR</button></div>';
  }).join('') : '<p class="rules" style="text-align:center">Bu odada bekleyen masa yok.<br>➕ Yeni masa aç — oyuncular sana katılsın!</p>';
  list.querySelectorAll('[data-tid]').forEach(b => b.onclick = () => {
    netLobbyStop();
    closeModal();
    NET.pendingYard = true;
    NET.lastJoin = null;
    netSend({ t: 'join', tableId: b.dataset.tid });
  });
}

/* masadaki profile tıklanınca: kart SUNUCUDAN gelir (bot/insan ayrımı yok) */
function netShowPcard(m) {
  const c = m.card;
  const winPct = c.games ? Math.round(c.wins / c.games * 100) : 0;
  modal('<h2>' + (c.ava || '🙂') + ' ' + escapeHtml(c.name) + '</h2>' +
    '<div class="dlg-row"><span class="lbl">ÇİP</span><span class="val"><span class="coin">M</span> ' + fmtChips(c.chips) + '</span></div>' +
    '<div class="dlg-row"><span class="lbl">SEVİYE</span><span class="val">' + c.lv + '</span></div>' +
    '<div class="dlg-row"><span class="lbl">OYUN</span><span class="val">' + c.games + '</span></div>' +
    '<div class="dlg-row"><span class="lbl">GALİBİYET</span><span class="val">' + c.wins + ' (%' + winPct + ')</span></div>' +
    '<div class="dlg-row"><span class="lbl">BAŞLANGIÇ</span><span class="val">' + c.start + '</span></div>' +
    '<div class="btnrow"><button class="btn" onclick="window.closeModal()">Kapat</button></div>');
}
function netRoundEnd(s) {
  stopTurnTimer();
  NET.modalKind = 'round';
  const rows = s.rows.map(r => resRow({
    crown: r.seat === s.finisher, win: r.seat === s.finisher,
    ava: avaOf(netRot(r.seat)), me: netRot(r.seat) === 0,
    name: r.name,
    sub: (r.roundScore > 0 ? '+' : '') + r.roundScore + ' el puanı',
    subCls: r.roundScore < 0 ? 'neg' : 'pos',
    right: r.score, rightSub: 'toplam',
  })).join('');
  const head = s.cancelled ? 'Dört oyuncu da çiftten açtı — el sayılmadı.'
    : s.finisher >= 0 ? '🏁 ' + s.rows.find(r => r.seat === s.finisher).name + ' eli bitirdi' + (s.eldenBitti ? ' — ELDEN!' : '') + (s.withOkey ? ' (okey ile)' : '')
    : 'Destede taş kalmadı.';
  modal('<h2>EL SONUCU</h2><p class="reshead">' + head + '</p><div class="reslist">' + rows + '</div>' +
    '<p class="rules" style="font-size:12px;text-align:center">Yeni el otomatik başlıyor…</p>');
}
function netFinal(m) {
  stopTurnTimer();
  NET.modalKind = 'final';
  const rows = m.rows.map(r => resRow({
    crown: r.rank === 1, win: r.rank === 1,
    ava: avaOf(netRot(r.seat)), me: netRot(r.seat) === 0,
    name: r.rank + '. ' + r.name,
    sub: '🪙 ' + (r.receive ? '+' + fmtChips(r.receive) : '0'),
    subCls: r.receive > currentStake ? 'neg' : (!r.receive ? 'pos' : ''),
    right: r.score, rightSub: 'puan',
  })).join('');
  const myRow = m.rows.find(r => netRot(r.seat) === 0);
  modal('<h2>OYUN SONUCU</h2>' +
    '<p class="reshead">' + (myRow && myRow.rank === 1 ? '🏆 Kazandın!' : (m.rows[0].name + ' kazandı')) +
    (m.sweep ? ' · <b class="rznote">Tek açan — potun tamamı!</b>' : '') + '</p>' +
    '<div class="reslist">' + rows + '</div>' +
    (m.me ? '<p class="rules" style="font-size:12.5px;text-align:center">🌐 Online bakiyen: <b><span class="coin">M</span> ' + fmtChips(m.me.chips) + '</b></p>' : '') +
    '<div class="btnrow finalbtns"><button class="btn exit" id="nf-x">MASADAN AYRIL</button>' +
    '<button class="btn go" id="nf-again">YENİ OYUN</button></div>');
  if (myRow && myRow.receive > 0) setTimeout(() => chipFx(myRow.receive), 400);
  playSnd(myRow && myRow.rank === 1 ? 'win' : 'lose');
  if (m.me) { NET.user = m.me; }
  $('nf-x').onclick = () => { closeModal(); netExit(); };
  $('nf-again').onclick = () => {
    closeModal();
    const j = NET.lastJoin || { stake: currentStake || 1000, rounds: 1, opts: {}, yardimli: true };
    netJoin(j.stake, j.rounds, j.opts, j.yardimli);
  };
}
function netJoin(stake, rounds, opts, yardimli) {
  NET.lastJoin = { stake, rounds, opts: opts || {}, yardimli };
  NET.pendingYard = yardimli !== false;
  NET.stakeFxDone = false; NET.lastTurnLoc = -1; NET.evQ.length = 0;
  chatState.msgs = []; chatState.unread = 0; renderChat();
  netSend(Object.assign({ t: 'join', stake, rounds }, opts || {}));
}
function netReady() { return !!(NET.ws && NET.ws.readyState === 1 && NET.user); }
/* bağlanmayı dene; kısa sürede olmazsa çevrimdışı say */
function netTry(cb) {
  if (netReady()) return cb(true);
  let done = false;
  netConnect(() => { if (!done) { done = true; cb(true); } });
  setTimeout(() => { if (!done) { done = true; cb(false); } }, 2500);
}
function netExit(msg) {
  NET.on = false; NET.leaving = false; NET.view = null; NET.modalKind = null;
  if (NET.tickInt) { clearInterval(NET.tickInt); NET.tickInt = null; }
  stopTurnTimer();
  netBanner(null);
  G = null; ui.busy = false;
  closeModal();
  $('scr-game').classList.add('hidden');
  $('scr-start').classList.remove('hidden');
  initStart();
  if (msg) toast(msg, true);
}

/* açılışta sessizce bağlan: menü sunucu bakiyesini gösterir, OYNA anında eşleşir */
setTimeout(() => netTry(() => {}), 350);
window.__net = NET;

/* init */
initStart();
window.__okey = {
  get G() { return G; }, render, get ui() { return ui; },
  get rack() { return rackSlots.slice(); },
  setRack(a) { rackSlots = a.slice(0, RACK_SLOTS); while (rackSlots.length < RACK_SLOTS) rackSlots.push(null); },
  analyze: () => analyzeRack(), sortRack, showRoundEnd, showFinal,
  get meta() { return meta; },
  timer: { expire: onTurnTimeout, start: startTurnTimer, get deadline() { return timerDeadline; } },
};
})();

</script>
</body>
